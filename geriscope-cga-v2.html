*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#f7f4ee;color:#0d1614;overflow-x:hidden;-webkit-font-smoothing:antialiased}
:root{
  --ink:#0d1614;--sage:#3d6b5e;--sage-lt:#5a9080;--sage-pale:#e8f0ed;
  --gold:#c9a84c;--gold-lt:#e8c97a;--cream:#f7f4ee;--white:#ffffff;
  --gray:#6b7b7e;--border:#d4ddd9;--red:#c0392b;--amber:#e67e22;--green:#27ae60;
}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.mono{font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .35s ease both}
input,select,textarea{font-family:'DM Sans',sans-serif}
@keyframes progressBar{0%{transform:translateX(-100%)}50%{transform:translateX(80%)}100%{transform:translateX(200%)}}
@media print{
  body > div#root > *{display:none!important}
  #printDoc{display:block!important;font-family:Georgia,serif}
  @page{margin:1.8cm 1.5cm;size:A4}
}
#printDoc{display:none}
</style>

const _branding = (()=>{
  try{ return JSON.parse(localStorage.getItem("gs_branding")||"null")||{}; }
  catch(e){ return {}; }
})();

function age(dob){
  const b=new Date(dob),n=new Date();
  let a=n.getFullYear()-b.getFullYear();
  if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;
  return a;
}

      {id:"sleep",      label:"Sleep Quality",         time:"~3 min", note:"Sleep disturbance screening."},
      {id:"continence", label:"Continence",             time:"~3 min", note:"Urinary/faecal incontinence."},
      {id:"dysphagia",  label:"Dysphagia — EAT-10",    time:"~3 min", note:"Swallowing difficulty screening."},
      {id:"braden",     label:"Braden — Pressure Ulcers", time:"~5 min", note:"Pressure ulcer risk assessment. Score 6-23."},
    ]
  },
  {
    id:"prognostic", label:"Prognostic Assessment", icon:"📈", color:"#be185d",
    note:"Discharge risk and multidimensional mortality prognosis.",

      {id:"brass", label:"BRASS",  time:"~8 min",  note:"Blaylock discharge risk. Score 0–40."},

    ]

  {id:"mm_wr", dom:"Language",    q:"Write a sentence"},

function mmseInterp(s){
  if(s>=27)return{label:"Normal",             color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s>=21)return{label:"Mild impairment",    color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  if(s>=11)return{label:"Moderate impairment",color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  return        {label:"Severe impairment",   color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
}

// GDS-15
const GDS = [
  {id:"g1", q:"Are you basically satisfied with your life?",             rev:true},
  {id:"g2", q:"Have you dropped many of your activities and interests?", rev:false},
  {id:"g3", q:"Do you feel your life is empty?",                         rev:false},
  {id:"g4", q:"Do you often get bored?",                                 rev:false},
  {id:"g5", q:"Are you in good spirits most of the time?",               rev:true},
  {id:"g6", q:"Are you afraid something bad is going to happen?",        rev:false},
  {id:"g7", q:"Do you feel happy most of the time?",                     rev:true},
  {id:"g8", q:"Do you often feel helpless?",                             rev:false},
  {id:"g9", q:"Do you prefer staying home rather than going out?",       rev:false},
  {id:"g10",q:"Do you feel you have more memory problems than most?",    rev:false},
  {id:"g11",q:"Do you think it is wonderful to be alive?",               rev:true},
  {id:"g12",q:"Do you feel pretty worthless the way you are?",           rev:false},
  {id:"g13",q:"Do you feel full of energy?",                             rev:true},
  {id:"g14",q:"Do you feel your situation is hopeless?",                 rev:false},
  {id:"g15",q:"Do you think most people are better off than you?",       rev:false},
];
function gdsInterp(s){
  if(s<=4) return{label:"Normal",             color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s<=8) return{label:"Mild depression",    color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  if(s<=11)return{label:"Moderate depression",color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  return        {label:"Severe depression",   color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
}

// CAM
const CAM=[
  {id:"c1",q:"Feature 1: Acute onset & fluctuating course",detail:"Evidence of acute mental status change from baseline? Does it fluctuate?",req:true},
  {id:"c2",q:"Feature 2: Inattention",detail:"Difficulty focusing attention? Easily distracted or unable to keep track?",req:true},
  {id:"c3",q:"Feature 3: Disorganised thinking",detail:"Incoherent or disorganised thinking, rambling or irrelevant conversation?",req:false},
  {id:"c4",q:"Feature 4: Altered level of consciousness",detail:"Anything other than alert? (Vigilant, lethargic, stuporous, comatose)",req:false},
];
function camInterp(a){
  if(a.c1==="yes"&&a.c2==="yes"&&(a.c3==="yes"||a.c4==="yes"))
    return{label:"DELIRIUM PRESENT",color:"var(--red)",bg:"rgba(192,57,43,.15)",pos:true};
  return{label:"Delirium absent",color:"var(--green)",bg:"rgba(39,174,96,.1)",pos:false};
}

// ADL
const ADL=[
  {id:"a1",label:"Bathing",     opts:[{s:0,l:"Dependent"},{s:1,l:"Independent"}]},
  {id:"a2",label:"Dressing",    opts:[{s:0,l:"Dependent"},{s:1,l:"Independent"}]},
  {id:"a3",label:"Toileting",   opts:[{s:0,l:"Dependent"},{s:1,l:"Independent"}]},
  {id:"a4",label:"Transferring",opts:[{s:0,l:"Dependent"},{s:1,l:"Independent"}]},
  {id:"a5",label:"Continence",  opts:[{s:0,l:"Incontinent"},{s:1,l:"Continent"}]},
  {id:"a6",label:"Feeding",     opts:[{s:0,l:"Dependent"},{s:1,l:"Independent"}]},
];
function adlInterp(s){
  if(s===6)return{label:"Full independence",  color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s>=4) return{label:"Mild dependence",    color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  if(s>=2) return{label:"Moderate dependence",color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  return        {label:"Severe dependence",   color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
}
// BARTHEL INDEX (10 items, max 100)
const BARTHEL=[
  {id:"ba_bow",label:"Bowels",        opts:[{s:0,l:"Incontinent"},{s:5,l:"Occasional accident"},{s:10,l:"Continent"}]},
  {id:"ba_bla",label:"Bladder",       opts:[{s:0,l:"Incontinent or catheterised"},{s:5,l:"Occasional accident"},{s:10,l:"Continent"}]},
  {id:"ba_gro",label:"Grooming",      opts:[{s:0,l:"Needs help"},{s:5,l:"Independent (face, hair, teeth, shaving)"}]},
  {id:"ba_toi",label:"Toilet use",    opts:[{s:0,l:"Dependent"},{s:5,l:"Needs some help"},{s:10,l:"Independent"}]},
  {id:"ba_eat",label:"Feeding",       opts:[{s:0,l:"Unable"},{s:5,l:"Needs help cutting, spreading"},{s:10,l:"Independent"}]},
  {id:"ba_tra",label:"Transfer (bed to chair)",opts:[{s:0,l:"Unable — no sitting balance"},{s:5,l:"Major help needed"},{s:10,l:"Minor help or supervision"},{s:15,l:"Independent"}]},
  {id:"ba_mob",label:"Mobility",      opts:[{s:0,l:"Immobile"},{s:5,l:"Wheelchair independent"},{s:10,l:"Walks with help of one person"},{s:15,l:"Independent (may use aid)"}]},
  {id:"ba_dre",label:"Dressing",      opts:[{s:0,l:"Dependent"},{s:5,l:"Needs help but does half unaided"},{s:10,l:"Independent (including buttons, zips)"}]},
  {id:"ba_sta",label:"Stairs",        opts:[{s:0,l:"Unable"},{s:5,l:"Needs help or supervision"},{s:10,l:"Independent up and down"}]},
  {id:"ba_bat",label:"Bathing",       opts:[{s:0,l:"Dependent"},{s:5,l:"Independent (bath, shower or strip wash)"}]},
];
function barthelInterp(s){
  if(s===100)return{label:"Full independence",   color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s>=75)  return{label:"Mild dependence",     color:"#84cc16",    bg:"rgba(132,204,22,.1)"};
  if(s>=50)  return{label:"Moderate dependence", color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  if(s>=25)  return{label:"Severe dependence",   color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  return          {label:"Total dependence",     color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
}

// IADL
const IADL=[
  {id:"i1",label:"Telephone",    opts:[{s:3,l:"Independent"},{s:2,l:"Answers only"},{s:1,l:"Unable"}]},
  {id:"i2",label:"Shopping",     opts:[{s:3,l:"Independent"},{s:2,l:"With assistance"},{s:1,l:"Unable"}]},
  {id:"i3",label:"Food prep",    opts:[{s:3,l:"Independent"},{s:2,l:"Heats only"},{s:1,l:"Unable"}]},
  {id:"i4",label:"Housekeeping", opts:[{s:3,l:"Alone"},{s:2,l:"Light tasks"},{s:1,l:"Unable"}]},

  {id:"i7",label:"Medications",  opts:[{s:3,l:"Independent"},{s:2,l:"Reminded"},{s:1,l:"Unable"}]},
  {id:"i8",label:"Finances",     opts:[{s:2,l:"Independent"},{s:1,l:"Major bills"},{s:0,l:"Unable"}]},
];

// SPPB
const SPPB_BAL=[{s:0,l:"Unable — side by side < 10s"},{s:1,l:"Semi-tandem — unable 10s"},{s:2,l:"Semi-tandem ≥10s, tandem < 3s"},{s:3,l:"Tandem 3–9.99s"},{s:4,l:"Full tandem ≥10s"}];
const SPPB_WALK=[{s:0,l:"Unable/incomplete"},{s:1,l:"≥8.70s"},{s:2,l:"6.21–8.70s"},{s:3,l:"4.82–6.20s"},{s:4,l:"< 4.82s"}];
const SPPB_CHAIR=[{s:0,l:"Unable/incomplete"},{s:1,l:"> 60s"},{s:2,l:"16.70–60s"},{s:3,l:"13.70–16.69s"},{s:4,l:"≤ 13.69s"}];
function sppbInterp(s){
  if(s===12)return{label:"Normal",             color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s>=9)  return{label:"Mild limitation",    color:"#8bc34a",    bg:"rgba(139,195,74,.1)"};
  if(s>=7)  return{label:"Moderate limitation",color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  return         {label:"Severe limitation",   color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
}

// Charlson
const CHARLSON=[
  {id:"ch1",label:"Myocardial infarction",w:1},{id:"ch2",label:"Congestive heart failure",w:1},
  {id:"ch3",label:"Peripheral vascular disease",w:1},{id:"ch4",label:"Cerebrovascular disease",w:1},
  {id:"ch5",label:"Dementia",w:1},{id:"ch6",label:"Chronic pulmonary disease",w:1},
  {id:"ch7",label:"Connective tissue disease",w:1},{id:"ch8",label:"Peptic ulcer disease",w:1},
  {id:"ch9",label:"Mild liver disease",w:1},{id:"ch10",label:"Diabetes (no end-organ damage)",w:1},
  {id:"ch11",label:"Hemiplegia",w:2},{id:"ch12",label:"Moderate/severe renal disease",w:2},
  {id:"ch13",label:"Diabetes with end-organ damage",w:2},{id:"ch14",label:"Tumour (within 5 years)",w:2},
  {id:"ch15",label:"Leukaemia",w:2},{id:"ch16",label:"Lymphoma",w:2},
  {id:"ch17",label:"Moderate/severe liver disease",w:3},
  {id:"ch18",label:"Metastatic solid tumour",w:6},{id:"ch19",label:"AIDS",w:6},
];

// CIRS systems
const CIRS_SYS=["Heart","Hypertension","Vascular","Respiratory","ENT","Upper GI",
  "Lower GI","Hepatic","Renal","Genitourinary","Musculoskeletal/Skin","Neurological",
  "Endocrine/Metabolic","Psychiatric/Behaviour"];

// MNA
const MNA=[
  {id:"m1",q:"Food intake decline past 3 months?",opts:[{s:0,l:"Severe"},{s:1,l:"Moderate"},{s:2,l:"No decrease"}]},
  {id:"m2",q:"Weight loss last 3 months?",opts:[{s:0,l:"> 3 kg"},{s:1,l:"Unknown"},{s:2,l:"1–3 kg"},{s:3,l:"No loss"}]},
  {id:"m3",q:"Mobility?",opts:[{s:0,l:"Bed/chair bound"},{s:1,l:"Gets out of bed"},{s:2,l:"Goes out"}]},
  {id:"m4",q:"Neuropsychological problems?",opts:[{s:0,l:"Severe dementia/depression"},{s:1,l:"Mild dementia"},{s:2,l:"None"}]},
  {id:"m5",q:"BMI (kg/m²)?",opts:[{s:0,l:"< 19"},{s:1,l:"19–21"},{s:2,l:"21–23"},{s:3,l:"≥ 23"}]},
  {id:"m6",q:"Lives independently?",opts:[{s:0,l:"No"},{s:1,l:"Yes"}]},
];
function mnaInterp(s){
  if(s>=12)return{label:"Normal — no risk",       color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s>=8) return{label:"At risk of malnutrition",color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  return        {label:"Malnourished",             color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
}

// PAINAD
const PAINAD=[
  {id:"pa1",label:"Breathing",opts:[{s:0,l:"Normal"},{s:1,l:"Occasional laboured breathing"},{s:2,l:"Noisy laboured / long distress periods"}]},
  {id:"pa2",label:"Negative vocalization",opts:[{s:0,l:"None"},{s:1,l:"Occasional moan/groan"},{s:2,l:"Repeated calling, crying"}]},
  {id:"pa3",label:"Facial expression",opts:[{s:0,l:"Smiling or inexpressive"},{s:1,l:"Sad / frightened / frowning"},{s:2,l:"Grimacing"}]},
  {id:"pa4",label:"Body language",opts:[{s:0,l:"Relaxed"},{s:1,l:"Tense / distressed pacing"},{s:2,l:"Rigid / striking out"}]},
  {id:"pa5",label:"Consolability",opts:[{s:0,l:"No need"},{s:1,l:"Distracted by voice/touch"},{s:2,l:"Unable to console"}]},
];
function painadInterp(s){
  if(s<=2)return{label:"No or mild pain",   color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s<=6)return{label:"Moderate pain",     color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  return       {label:"Severe pain",        color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
}

// Zarit (abbreviated 12-item for space — full 22 in notes)
const ZARIT=[
  "Patient asks for more help than needed?",
  "Not enough time for yourself because of caring?",
  "Stressed between caring and other responsibilities?",
  "Embarrassed by patient's behaviour?",
  "Angry when around the patient?",
  "Patient affects your relationships with others?",
  "Afraid of what the future holds for patient?",
  "Patient is dependent on you?",
  "Feel strained when around the patient?",
  "Health has suffered due to caring?",
  "Not enough privacy because of the patient?",
  "Social life has suffered because of caring?",
];
function zaritInterp(s){
  if(s<=20)return{label:"Little or no burden",    color:"var(--green)",bg:"rgba(39,174,96,.1)"};
  if(s<=40)return{label:"Mild to moderate burden",color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
  if(s<=60)return{label:"Moderate to severe",     color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  return        {label:"Severe burden",           color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
}

// CFS

const HELP = {
  mmse:{title:"MMSE — Mini-Mental State Examination",purpose:"Screening cognitivo globale. Valuta orientamento, memoria, attenzione, calcolo, linguaggio e prassia costruttiva. Validato e ampiamente diffuso. Meno sensibile dell'MMSE per il deterioramento lieve (MCI) — in quei casi preferire MoCA.",time:"8–12 minuti",developed:"Folstein et al., 1975",scoring:"27–30: Normale\n21–26: Deterioramento lieve\n11–20: Deterioramento moderato\n0–10: Deterioramento grave",admin:["Ambiente silenzioso, paziente seduto e collaborante","Leggere ogni item con tono neutro, senza suggerire la risposta","Orientamento temporale: giorno, mese, anno, stagione, giorno della settimana","Orientamento spaziale: Stato, regione, città, struttura, piano/reparto","Registrazione: dire 3 parole lentamente (MELA – TAVOLO – PENNY) e chiedere di ripeterle subito","Attenzione: 100 – 7 per 5 sottrazioni OPPURE compitare MONDO al contrario","Richiamo: richiedere le 3 parole dette in precedenza","Linguaggio: mostrare orologio e matita ('Come si chiama questo?')","Ripetizione: far ripetere 'Non c'è se, ma o però'","Comprensione: 'Prenda il foglio con la mano destra, lo pieghi a metà, lo metta sul pavimento'","Lettura: mostrare scritto 'CHIUDA GLI OCCHI'","Scrittura: 'Scriva una frase di senso compiuto'","Copia: 'Copi esattamente questo disegno' (pentagoni sovrapposti)"],correction:"Correggere per scolarità: -1 punto per ogni anno di istruzione sotto i 5 anni (max -3 punti).",notes:"Un punteggio borderline (24–26) in paziente con alta scolarità è più significativo. Considerare sempre il declino rispetto al baseline stimato.",printItems:[{cat:"Orientamento temporale (5 pt)",items:["Giorno della settimana","Giorno del mese","Mese","Anno","Stagione"]},{cat:"Orientamento spaziale (5 pt)",items:["Nazione","Regione","Città","Struttura / Ospedale","Piano / Reparto"]},{cat:"Registrazione (3 pt)",items:["Ripete: MELA","Ripete: TAVOLO","Ripete: PENNY"]},{cat:"Attenzione e calcolo (5 pt)",items:["93","86","79","72","65"]},{cat:"Richiamo (3 pt)",items:["Ricorda: MELA","Ricorda: TAVOLO","Ricorda: PENNY"]},{cat:"Denominazione (2 pt)",items:["Nomina orologio","Nomina matita"]},{cat:"Ripetizione (1 pt)",items:["Ripete la frase esattamente"]},{cat:"Comprensione a 3 stadi (3 pt)",items:["Prende il foglio con la mano destra","Piega il foglio a metà","Lo mette sul pavimento"]},{cat:"Lettura (1 pt)",items:["Chiude gli occhi"]},{cat:"Scrittura (1 pt)",items:["Scrive una frase di senso compiuto"]},{cat:"Copia (1 pt)",items:["Copia i pentagoni sovrapposti"]}],hasSvg:true,svgItems:["pentagons","clock"]},
  moca:{title:"MoCA — Montreal Cognitive Assessment",purpose:"Screening cognitivo sensibile per MCI e demenza lieve. Valuta: visuospaziale/esecutivo, denominazione, attenzione, linguaggio, astrazione, memoria differita e orientamento. Preferire all'MMSE quando si sospetta MCI o demenza lieve.",time:"10–15 minuti",developed:"Nasreddine et al., 2005",scoring:"26–30: Normale (aggiungere +1 se scolarità ≤12 anni)\n18–25: Impairment lieve\n10–17: Impairment moderato\n0–9: Impairment grave",admin:["TMT B: 'Colleghi i cerchi alternando numeri e lettere: 1 poi A poi 2 poi B...' — senza staccare la matita","Copia cubo 3D: mostrare il modello e chiedere di copiarlo","Orologio: 'Disegni un orologio, inserisca tutti i numeri e le lancette alle 11 e 10'","Denominazione: mostrare 3 animali (leone, rinoceronte, cammello)","Span diretto: leggere '2 – 1 – 8 – 5 – 4' a 1 cifra/secondo","Span inverso: leggere '7 – 4 – 2', paziente ripete al contrario","Vigilanza A: leggere lista di lettere lentamente, il paziente batte il pugno ad ogni A","Calcolo: 100 – 7 per 5 sottrazioni consecutive","Ripetizione frase 1: 'So che John è quello che aiuta oggi'","Ripetizione frase 2: 'Il gatto si nascondeva sempre sotto il divano quando i cani erano presenti'","Fluenza F: quante parole che iniziano per F riesce a dire in 60 secondi? (≥11 = corretto)","Astrazione: 'In che senso si somigliano treno e bicicletta?' e 'Orologio e righello?'","Richiamo: richiedere le 5 parole memorizzate all'inizio senza aiuto, poi con categoria, poi con opzione multipla","Orientamento: data, mese, anno, giorno, luogo, città"],correction:"+1 punto se scolarità ≤ 12 anni.",notes:"Il MoCA è più sensibile dell'MMSE per deficit esecutivi e amnesia da recupero (MCI amnestico). Disponibile in versione validata italiana.",printItems:[{cat:"Visuospaziale / Esecutivo (5 pt)",items:["TMT B (1 pt)","Copia cubo (1 pt)","Orologio — contorno corretto (1 pt)","Orologio — numeri corretti (1 pt)","Orologio — lancette corrette (1 pt)"]},{cat:"Denominazione (3 pt)",items:["Leone (1 pt)","Rinoceronte (1 pt)","Cammello (1 pt)"]},{cat:"Attenzione (6 pt)",items:["Span diretto 2-1-8-5-4 (1 pt)","Span inverso 7-4-2 (1 pt)","Vigilanza lettera A (1 pt)","93 (1 pt)","86 (1 pt)","79 (1 pt)"]},{cat:"Linguaggio (3 pt)",items:["Ripete frase 1 (1 pt)","Ripete frase 2 (1 pt)","Fluenza ≥11 parole con F (1 pt)"]},{cat:"Astrazione (2 pt)",items:["Treno / bicicletta (1 pt)","Orologio / righello (1 pt)"]},{cat:"Memoria differita (5 pt)",items:["VISO (1 pt)","VELLUTO (1 pt)","CHIESA (1 pt)","MARGHERITA (1 pt)","ROSSO (1 pt)"]},{cat:"Orientamento (6 pt)",items:["Data (1 pt)","Mese (1 pt)","Anno (1 pt)","Giorno (1 pt)","Luogo (1 pt)","Città (1 pt)"]}],hasSvg:true,svgItems:["tmt","cube","clock"],words5:["VISO","VELLUTO","CHIESA","MARGHERITA","ROSSO"]},
  clock:{title:"Clock Drawing Test (CDT)",purpose:"Screening rapido di visuospazialità e funzioni esecutive. Identifica deficit nelle demenze, nelle sindromi frontali e nel neglect spaziale. Rapido, accettabile dal paziente, non richiede materiali particolari.",time:"2–4 minuti",developed:"Goodglass & Kaplan, 1983",scoring:"Punteggio GeriScope (max 3):\n1 pt — Contorno: cerchio approssimativamente chiuso\n1 pt — Numeri: tutti e 12 presenti, posizione approssimata\n1 pt — Lancette: indicano le 11:10 in modo riconoscibile",admin:["Consegnare un foglio bianco (o con il cerchio pre-stampato se il paziente ha difficoltà di planning)","Istruzione: 'Disegni un orologio con tutti i numeri e metta le lancette alle 11 e 10'","Non aiutare, non suggerire correzioni durante l'esecuzione","Non limitare il tempo (di solito < 3 minuti)","Osservare il processo: inizia dal centro? Distribuisce bene i numeri? Posiziona correttamente le lancette?"],notes:"Errori tipici nelle demenze: numeri fuori dal cerchio o in senso antiorario, lancette che indicano 10:11 invece di 11:10 ('pull to stimulus'), numeri ripetuti o mancanti.",hasSvg:true,svgItems:["clock"]},
  gds:{title:"GDS-15 — Geriatric Depression Scale",purpose:"Screening per la depressione nell'anziano. La versione breve (15 item) evita i sintomi somatici per ridurre i falsi positivi in presenza di comorbilità mediche. Validata e ampiamente usata in geriatria.",time:"5–7 minuti",developed:"Sheikh & Yesavage, 1986",scoring:"0–4: Normale\n5–8: Depressione lieve\n9–11: Depressione moderata\n12–15: Depressione grave",admin:["Fare le domande lentamente, in modo non giudicante","Riferirsi a come il paziente si è sentito nell'ULTIMA SETTIMANA","Se il paziente ha difficoltà uditive: mostrare le opzioni SÌ/NO scritte","Se MMSE < 15: la GDS perde affidabilità — considerare Cornell Scale for Depression in Dementia","Rispondere YES/NO, non scale intermedie"],notes:"Item a punteggio diretto (SÌ=1): 2,3,4,6,8,9,10,12,14,15\nItem inversi (NO=1): 1,5,7,11,13"},
  cam:{title:"CAM — Confusion Assessment Method",purpose:"Diagnosi di delirium al letto del paziente. Algoritmo a 4 caratteristiche, utilizzabile da personale non psichiatrico. Sensibilità 94%, specificità 89%.",time:"5 minuti",developed:"Inouye et al., 1990",scoring:"POSITIVO = Feature 1 E Feature 2 E (Feature 3 O Feature 4)\n\nNEGATIVO = mancano uno o più criteri richiesti",admin:["Feature 1 — ESORDIO ACUTO E DECORSO FLUTTUANTE: cambiamento rispetto al baseline? Fluctua durante la giornata? (informare con infermieri e familiari)","Feature 2 — DISATTENZIONE: difficoltà a mantenere l'attenzione? Si distrae facilmente? Risponde a domande non fatte?","Feature 3 — PENSIERO DISORGANIZZATO: discorso incoerente? Idee non connesse? Cambia argomento imprevedibilmente?","Feature 4 — ALTERAZIONE DEL LIVELLO DI COSCIENZA: iperallerta, letargico, soporoso o comatoso? (qualsiasi risposta diversa da 'normale/allerta' = positivo)"],notes:"Il delirium è un'emergenza medica. Cercare SEMPRE la causa sottostante: infezione, farmaci, dolore non trattato, ritenzione urinaria, fecaloma, ipoglicemia, iponatriemia."},
  barthel:{title:"Indice di Barthel",purpose:"Misura dell'indipendenza nelle 10 attività di base della vita quotidiana. La scala funzionale più usata in riabilitazione e geriatria. Predice mortalità, istituzionalizzazione e risposta alla riabilitazione.",time:"5–10 minuti",developed:"Mahoney & Barthel, 1965",scoring:"100: Indipendente\n75–99: Dipendenza lieve\n50–74: Dipendenza moderata\n25–49: Dipendenza grave\n0–24: Dipendenza totale\n\nScore < 60 = di solito non adatto alla dimissione senza supporto\nScore > 85 = buon predittore di dimissione domiciliare",admin:["Valutare ciò che il paziente FA effettivamente nelle ultime 48–72h, non ciò che potrebbe fare","Basarsi sull'osservazione e sulle informazioni di infermieri e familiari","L'uso di ausili (bastone, carrozzina) è compatibile con i punteggi più alti","I punteggi intermedi (5, 10) indicano necessità di assistenza parziale"],notes:"Ogni aumento di 5 punti nel Barthel durante la riabilitazione correla con miglioramento clinicamente significativo."},
  adl:{title:"ADL — Katz Index of Independence",purpose:"Valutazione dell'indipendenza nelle 6 attività di base. Scala ordinale semplice e rapida, utile per monitorare la traiettoria funzionale e pianificare la dimissione.",time:"3–5 minuti",developed:"Katz et al., 1963",scoring:"6: Indipendente in tutto\n4–5: Dipendenza lieve\n2–3: Dipendenza moderata\n0–1: Dipendenza severa",admin:["BAGNO: indipendente se lava tutto il corpo da solo (può ricevere aiuto per una sola parte)","VESTIRSI: indipendente se prende e indossa i vestiti da solo (escluse le scarpe)","TOILETTE: indipendente se va al bagno, si pulisce e si sistema senza aiuto","TRASFERIMENTO: indipendente se entra/esce dal letto e dalla sedia senza aiuto","CONTINENZA: controllo completo di intestino e vescica","ALIMENTAZIONE: si porta il cibo alla bocca da solo (il taglio può essere assistito)"]},
  iadl:{title:"IADL — Lawton & Brody Scale",purpose:"Valuta le attività strumentali, cognitivamente più complesse delle ADL. Sensibile ai deficit iniziali. Fondamentale per valutare la capacità di vita autonoma e i bisogni di supporto domiciliare.",time:"5 minuti",developed:"Lawton & Brody, 1969",scoring:"Punteggio più alto = maggiore indipendenza.\nRiduzione rispetto al baseline premorboso = segnale clinicamente rilevante anche se il valore assoluto appare normale.",admin:["Esplorare sempre il BASELINE PREMORBOSO (come era prima dell'evento acuto)","Telefono, fare acquisti, cucinare, cura della casa, lavanderia, trasporti, farmaci, denaro","Per pazienti istituzionalizzati: alcune voci potrebbero non essere applicabili","Informarsi con i familiari per una valutazione più accurata"]},
  sppb:{title:"SPPB — Short Physical Performance Battery",purpose:"Valuta la funzione degli arti inferiori con 3 test oggettivi: equilibrio, velocità del cammino e alzarsi dalla sedia. Predice disabilità, istituzionalizzazione e mortalità. Ottimo outcome per la riabilitazione.",time:"8–12 minuti",developed:"Guralnik et al., 1994",scoring:"12: Normale\n9–11: Limitazione lieve\n4–8: Limitazione moderata\n0–3: Limitazione severa\n\nOgni calo di 1 punto = aumento significativo del rischio di disabilità",admin:["TEST EQUILIBRIO — 3 stazioni successive:\n  a. Piedi affiancati: mantenere 10s → se fallisce: 0pt per equilibrio\n  b. Semi-tandem: tallone a lato dell'alluce opposto, 10s\n  c. Tandem: tallone contro punta, 10s\n  Scoring: 0=incapace, 1=tandem<3s, 2=tandem 3–9.9s, 3=semi-tandem OK+tandem<3s, 4=tandem≥10s","TEST VELOCITA' CAMMINO — 4 metri a passo normale, misurare il tempo:\n  0=incapace, 1=≥8.70s, 2=6.21–8.70s, 3=4.82–6.20s, 4=<4.82s","TEST ALZARSI — 5 ripetizioni con braccia incrociate, più veloce possibile:\n  0=incapace, 1=>60s, 2=16.70–60s, 3=13.70–16.69s, 4=≤13.69s"],notes:"SPPB ≤ 9 = fragile performance fisica. Indicazione alla fisioterapia e programma di esercizio."},
  tug:{title:"Timed Up & Go (TUG)",purpose:"Misura della mobilità funzionale e del rischio di caduta. Rapido, oggettivo, ben validato. Indica la capacità di trasferimento e di deambulazione.",time:"2–3 minuti",developed:"Podsiadlo & Richardson, 1991",scoring:"< 10s: Normale — basso rischio cadute\n10–20s: Rischio lieve-moderato — valutare fisioterapia\n> 20s: Rischio elevato — intervento urgente, fisioterapia\n> 30s: Alta dipendenza — assistenza necessaria per la maggior parte delle IADL",admin:["Sedia con braccioli, altezza seduta circa 46 cm, il paziente usa i propri ausili abituali","Il paziente parte seduto con la schiena appoggiata allo schienale","Al segnale 'VIA': si alza, cammina fino al segnale a 3 metri, gira, torna, si risiede","Il cronometro parte al 'VIA' e si ferma quando il paziente ha completamente ripreso posizione seduta","Prima una prova di familiarizzazione (non cronometrata)","Annotare: tipo di ausili usati, eventuali esitazioni o instabilità"]},
  tinetti:{title:"Tinetti — POMA (Performance Oriented Mobility Assessment)",purpose:"Valuta equilibrio statico/dinamico e andatura. Predice il rischio di caduta. Utile in riabilitazione e per monitorare i progressi.",time:"8–12 minuti",developed:"Tinetti, 1986",scoring:"≥25: Basso rischio di caduta\n19–24: Rischio moderato\n<19: Rischio elevato — intervento urgente fisioterapico",admin:["EQUILIBRIO (max 16 pt) — paziente seduto su sedia senza braccioli:\n  Valutare: stabilità seduta, alzarsi, tentativi per alzarsi, equilibrio stazionario (immediato, prolungato), risposta alla spinta, occhi chiusi, girarsi 360°, sedersi","ANDATURA (max 12 pt) — osservare mentre il paziente cammina:\n  Valutare: inizio del cammino, simmetria e altezza del passo, continuità, traiettoria, tronco, distanza dei piedi"],notes:"Tinetti < 19 = rischio elevato di caduta. Attivare: fisioterapia, valutazione dell'ambiente domestico, revisione farmacologica (benzodiazepine, antiipertensivi), supplementazione vitamina D."},
  cirs:{title:"CIRS — Cumulative Illness Rating Scale",purpose:"Quantifica il carico di comorbilità per 14 sistemi d'organo. Fornisce il Severity Index e il Comorbidity Index. Predice mortalità e outcome ospedaliero.",time:"8–15 minuti",developed:"Linn et al., 1968; versione geriatrica Miller 1992",scoring:"Per ogni sistema, 0–4:\n0: Nessun problema\n1: Lieve (non interferisce con l'attività normale)\n2: Moderato (richiede terapia o causa disabilità parziale)\n3: Grave (causa disabilità significativa, terapia intensiva)\n4: Gravissimo/terminale\n\nSeverity Index (media) > 1.5 = carico significativo\nComorbidity Index (n. sistemi ≥3) ≥ 2 = alta complessità"},
  charlson:{title:"Charlson Comorbidity Index (CCI)",purpose:"Predice la mortalità a 1 e 10 anni in base alle comorbilità ponderate. Guida le decisioni terapeutiche e la stratificazione del rischio operatorio e oncologico.",time:"5 minuti",developed:"Charlson et al., 1987",scoring:"0 pt: mortalità stimata 10 anni ~12%\n1–2 pt: ~26%\n3–4 pt: ~52%\n≥5 pt: ~85%\n(Versione età-aggiustata: +1 pt per ogni decade dopo i 50 anni)"},
  beers:{title:"Criteri di Beers — Revisione Farmacologica",purpose:"Identificano farmaci potenzialmente inappropriati nell'anziano (AGS Beers Criteria 2023). La revisione sistematica riduce eventi avversi, cadute, ricoveri e mortalità.",time:"5–10 minuti",developed:"Beers 1991; AGS aggiornamento 2023",scoring:"Non è un punteggio numerico. Ogni farmaco segnalato richiede valutazione: beneficio > rischio? Esiste alternativa più sicura?",admin:["Raccogliere lista completa dei farmaci inclusi OTC, erbe officinali e integratori","Identificare farmaci ad alto rischio: anticolinergici, benzodiazepine, antipsicotici, FANS, sulfaniluree a lunga azione","Valutare la dose in funzione della clearance renale (attenzione a metformina, digossina, FANS, oppioidi)","Polypharmacy = 5+ farmaci. Hyperpolypharmacy = 10+. Il rischio di interazioni cresce esponenzialmente"],notes:"Strumenti complementari europei: STOPP/START criteria (più applicabili alla pratica italiana e europea)."},
  pain:{title:"Valutazione del Dolore — NRS e PAINAD",purpose:"NRS per pazienti collaboranti (autovalutazione). PAINAD per pazienti non verbali o con MMSE ≤15 (valutazione comportamentale osservazionale). Il dolore nell'anziano è spesso sottotrattato.",time:"2–5 minuti",scoring:"NRS: 0=nessun dolore · 1-3=lieve · 4-6=moderato · 7-10=severo\nPAINAD: 0-2=nessuno/lieve · 3-7=moderato · 8-10=severo",admin:["NRS — chiedere: 'Su una scala da 0 a 10, dove 0 = nessun dolore e 10 = il peggior dolore che si possa immaginare, come valuta il suo dolore in questo momento?'","PAINAD — osservare per 5 minuti a riposo e durante la mobilizzazione:\n  Respirazione (0=normale, 1=affannosa occasionale, 2=affannosa prolungata/Cheyne-Stokes)\n  Vocalizzazione (0=nessuna, 1=lamenti/parole di dolore, 2=grida/pianto)\n  Espressione facciale (0=sorridente/neutrale, 1=triste/spaventata, 2=smorfie)\n  Linguaggio del corpo (0=rilassato, 1=teso/allerta, 2=rigido/pugni stretti)\n  Consolabilità (0=non necessaria, 1=distraibile con voce/tocco, 2=non consolabile)"],notes:"Il dolore cronico nell'anziano si manifesta spesso come agitazione, rifiuto del cibo, isolamento o insonnia — non sempre come dolore riferito."},
  mna:{title:"MNA-SF — Mini Nutritional Assessment Short Form",purpose:"Screening nutrizionale validato per l'anziano in 6 item. Identifica malnutrizione e rischio nutrizionale. La malnutrizione è associata a prognosi peggiore, aumento delle complicazioni e ritardo nella guarigione.",time:"3–5 minuti",developed:"Vellas & Guigoz 1994; Rubenstein 2001 (SF)",scoring:"≥12: Stato nutrizionale normale\n8–11: A rischio di malnutrizione\n≤7: Malnutrizione",admin:["A: Riduzione dell'assunzione di cibo negli ultimi 3 mesi (perdita appetito, problemi digestivi, masticazione, deglutizione)","B: Perdita di peso recente — se più di 3kg=0, non sa=1, 1-3kg=2, nessuna perdita=3","C: Mobilità — allettato/sedia=0, si alza ma non esce=1, esce=2","D: Stress psicologico o malattia acuta negli ultimi 3 mesi — sì=0, no=2","E: Problemi neuropsicologici — demenza/depressione grave=0, lieve=1, nessuno=2","F1: BMI — <19=0, 19-21=1, 21-23=2, ≥23=3   OPPURE   F2: Circonferenza del polpaccio — <31cm=0, ≥31cm=3"]},
  social_net:{title:"Valutazione della Rete Sociale",purpose:"Esplora la situazione abitativa, la rete di supporto informale/formale, le risorse economiche e le barriere ambientali. Fondamentale per pianificare la dimissione e valutare il rischio di isolamento.",time:"5–8 minuti",admin:["Raccogliere informazioni da paziente, familiari e/o assistente sociale","Con chi vive il paziente? Chi è il caregiver primario? Qual è la sua disponibilità?","Accessibilità domiciliare: scale, barriere architettoniche, ascensore, bagno adattato?","Risorse economiche: pensione sufficiente? Accesso a servizi domiciliari?","Frequenza dei contatti sociali: rischio di solitudine e isolamento sociale?"]},
  zarit:{title:"Zarit Caregiver Burden Interview (ZBI-12)",purpose:"Misura il carico soggettivo del caregiver in 5 domini: salute, benessere psicologico, finanze, vita sociale, relazione con il paziente. Identifica i caregiver a rischio di burnout.",time:"8–10 minuti",developed:"Zarit et al., 1980; Bédard 2001 (versione 12 item)",scoring:"0–20: Nessun carico\n21–40: Carico lieve-moderato\n41–60: Carico moderato-severo\n>60: Carico severo — supporto psicologico urgente",admin:["Somministrare al CAREGIVER, non al paziente","Riferirsi alle ultime settimane","Scala di risposta: mai=0, raramente=1, qualche volta=2, spesso=3, quasi sempre=4"],notes:"Un carico elevato del caregiver è fattore di rischio per abbandono, maltrattamento del paziente e peggioramento della salute del caregiver stesso."},
  sleep:{title:"Valutazione della Qualità del Sonno",purpose:"Screening per disturbi del sonno nell'anziano: insonnia, sonnolenza diurna, disturbi circadiani. I disturbi del sonno aumentano il rischio di cadute, decadimento cognitivo e depressione.",time:"3–5 minuti",admin:["Difficoltà ad addormentarsi? Risvegli notturni? Risveglio mattutino precoce?","Sonnolenza diurna eccessiva: interferisce con le attività?","Russamento notturno o apnee osservate dal partner/familiari?","Movimenti involontari delle gambe (sindrome delle gambe senza riposo)?","Uso di farmaci ipnotici: da quanto tempo? Ancora efficaci? Effetti collaterali?"],notes:"Benzodiazepine e Z-drugs sono nei Criteri di Beers: aumentano il rischio di cadute, confusione e dipendenza nell'anziano. Preferire terapia cognitivo-comportamentale, melatonina a basse dosi, igiene del sonno."},
  continence:{title:"Valutazione della Continenza",purpose:"Incontinenza urinaria e fecale colpisce il 30–50% degli anziani ospedalizzati. Spesso non dichiarata spontaneamente. Riduce qualità di vita, aumenta rischio di lesioni da pressione e istituzionalizzazione.",time:"3–5 minuti",admin:["Chiedere DIRETTAMENTE: 'Perde urina involontariamente?' — molti pazienti non lo riferiscono senza domanda esplicita","Caratterizzare il tipo: urgenza (imperiosità), sforzo (tosse/starnuto/sforzo), overflow (ritenzione-prostata), funzionale (mobilità ridotta)","Valutare impatto sulle AVQ e sulla qualità di vita","Escludere cause reversibili: UTI, farmaci (diuretici, anticolinergici, alfa-litici), mobilità ridotta (DIAPPERS mnemonic)"],notes:"Cause reversibili di incontinenza (DIAPPERS): Delirium, Infection, Atrophic urethritis, Pharmacological, Psychologic, Excessive output, Restricted mobility, Stool impaction."},
  dysphagia:{title:"EAT-10 — Screening Disfagia",purpose:"Questionario di screening per la disfagia (10 item). Punteggio ≥3 suggerisce disfagia e richiede valutazione logopedica. La disfagia è frequentemente sottodiagnosticata nell'anziano.",time:"3–5 minuti",developed:"Belafsky et al., 2008",scoring:"0–2: Nella norma\n≥3: Possibile disfagia — inviare alla valutazione logopedica\nOgni item: 0=nessun problema, 4=problema grave",admin:["Somministrare al paziente o al caregiver se il paziente non è in grado","Fare riferimento alle ultime 4 settimane","Se punteggio ≥3: approfondire con test clinico di deglutizione (GUSS, SSA) e/o videofluoroscopia"],notes:"La disfagia nell'anziano è associata a polmonite ab ingestis (causa di mortalità), malnutrizione e disidratazione. In caso di sospetto: dieta modificata texture C-D in attesa di valutazione formale."},
  handgrip:{title:"Handgrip Strength — Forza di Presa",purpose:"Indicatore di sarcopenia e fragilità muscolare. La forza di presa è fortemente correlata con la forza muscolare globale, la qualità di vita, le cadute e la mortalità. È il primo step diagnostico per la sarcopenia (EWGSOP2).",time:"3–5 minuti",developed:"EWGSOP2 — Cruz-Jentoft et al., 2019",scoring:"Cutoff EWGSOP2:\nUomini: < 27 kg = ridotta forza di presa\nDonne: < 16 kg = ridotta forza di presa\n\nIl valore va poi contestualizzato sulla curva percentile per età e sesso (vedi grafico GeriScope).",admin:["Utilizzare dinamometro calibrato (es. Jamar, standard di riferimento)","Paziente seduto: gomito a 90°, avambraccio neutro, polso tra 0° e 30° di estensione","Mano dominante come riferimento principale","3 prove per ciascuna mano, con 60 secondi di riposo tra le prove","Registrare il VALORE MIGLIORE delle 3 prove","Incoraggiare il massimo sforzo: 'Stringere più forte possibile!'","Annotare: mano dominante, eventuale dolore articolare, uso di tutori"],notes:"La sarcopenia (EWGSOP2) richiede: bassa forza + bassa massa muscolare (DEXA, BIA o ecografia muscolare). La handgrip è il criterio primario. Se bassa forza + bassa massa + bassa performance fisica = sarcopenia grave."},
  braden:{title:"Scala di Braden — Rischio LdP",purpose:"Valuta il rischio di sviluppare lesioni da pressione (LdP). Score 6–23: più basso = rischio più alto. Guida le misure preventive e l'intensità del piano di nursing.",time:"5–8 minuti",developed:"Braden & Bergstrom, 1987",scoring:"19–23: Rischio basso\n15–18: Rischio lieve\n13–14: Rischio moderato\n10–12: Rischio alto\n6–9: Rischio molto alto → presidi antidecubito e turning immediati",admin:["PERCEZIONE SENSORIALE: risponde al dolore? Comunica il disagio?","UMIDITA': cute esposta a sudore, urine, feci?","ATTIVITA': a letto, in sedia, cammina poco, cammina frequentemente","MOBILITA': capacità di cambiare posizione autonomamente","NUTRIZIONE: digiuno? Dieta liquida? Metà del pasto? Pasto completo?","FRIZIONE/SCIVOLAMENTO: viene trascinato nelle lenzuola? Si muove in modo indipendente?"],notes:"Score ≤12 → protocollo intensivo: materasso antidecubito, cambio postura ogni 2h, protezione prominenze ossee (talloni, sacro, trocantere), idratazione cutanea, ottimizzazione nutrizionale."},
  brass:{
    title:"BRASS — Blaylock Discharge Risk Assessment",
    purpose:"Identifica i pazienti ad alto rischio di dimissione complessa. Consente la pianificazione precoce del percorso post-ospedaliero: assistenza domiciliare, trasferimento in struttura, supporto al caregiver. Validato in ambito ospedaliero geriatrico.",
    time:"8–10 minuti",developed:"Blaylock & Cason, 1992",
    scoring:"0–10: Rischio basso — dimissione standard\n11–19: Rischio moderato — pianificazione strutturata, valutare supporto domiciliare\n\u226520: Rischio alto — dimissione complessa, attivare assistente sociale",
    admin:["Somministrare all'ingresso o nelle prime 48h di ricovero","Aggiornare il punteggio se cambiano le condizioni cliniche o sociali","Score \u226520: attivare precocemente il team multiprofessionale per la pianificazione della dimissione"],
    notes:"Il BRASS misura la COMPLESSITA' della dimissione, non la prognosi di mortalit\u00e0. Un punteggio alto richiede lavoro multiprofessionale strutturato.",
  },
  mpi:{
    title:"MPI — Multidimensional Prognostic Index",
    purpose:"Indice prognostico multidimensionale validato per stimare la mortalit\u00e0 a breve-medio termine nell'anziano ospedalizzato. Aggrega 8 domini della VMG in un unico score 0–1. Validato in oltre 30 studi internazionali.",
    time:"5 minuti (dopo VMG completa)",developed:"Pilotto et al., 2008",
    scoring:"MPI 0.00–0.33: MPI-1 — Rischio basso (mortalit\u00e0 a 1 mese <15%)\nMPI 0.34–0.66: MPI-2 — Rischio moderato (mortalit\u00e0 a 1 mese 15–35%)\nMPI 0.67–1.00: MPI-3 — Rischio alto (mortalit\u00e0 a 1 mese >35%)",
    admin:["Completare le scale VMG di base: ADL, IADL, MMSE, MNA, Barthel, BRASS","Per ogni dominio il sistema calcola automaticamente il grado 0/0.5/1","Inserire manualmente il grado per rete sociale e comorbidit\u00e0/farmaci","L'MPI si calcola come media aritmetica degli 8 gradi"],
    notes:"L'MPI \u00e8 uno strumento PROGNOSTICO, non terapeutico. Va comunicato con cautela. Non va usato come unico criterio per decisioni di cure intensive o palliative — sempre integrato con il giudizio clinico globale.",
  },
  cfs:{title:"Clinical Frailty Scale (CFS)",purpose:"Misura globale della fragilità basata sul giudizio clinico. Valuta la riserva funzionale da 1 (vigoroso) a 9 (terminale). Predice mortalità, ricoveri, disabilità e risposta alle cure intensive.",time:"2–3 minuti",developed:"Rockwood et al., 2005; CSHA",scoring:"1–2: Robusta (non fragile)\n3: Gestione della malattia\n4: Vulnerabile\n5–6: Fragile (lieve–moderata)\n7–8: Gravemente fragile\n9: Terminale",admin:["Valutare lo stato PREMORBOSO (le 2 settimane prima dell'evento acuto che ha portato al ricovero)","Non usare il CFS nella fase acuta come misura definitiva","Integrare: capacità funzionale, comorbilità, stato cognitivo e riserva fisiologica","CFS ≥ 5 in paziente candidato a cure intensive: discutere con il paziente e i familiari"],notes:"CFS ≥ 5 durante il COVID-19 si è correlato ad alta mortalità in TI. Va sempre integrato con il contesto clinico individuale — non come unico criterio di esclusione dalle cure intensive."},
};

function HelpModal(){
  const [helpId, setHelpId] = React.useState(null);
  const [tab, setTab]       = React.useState("guide");
  React.useEffect(()=>{
    __setHelpOpen=(id)=>{setHelpId(id);setTab("guide");};
    return()=>{__setHelpOpen=null;};
  },[]);
  if(!helpId) return null;
  const h = HELP[helpId];
  if(!h) return null;
  function printForm(){
    const el=document.getElementById("helpPrintArea");
    if(!el)return;
    const w=window.open("","_blank","width=820,height=900");
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>'+h.title+'</title><style>body{font-family:Georgia,serif;color:#111;padding:1.5cm;max-width:21cm;margin:auto}h1{font-size:16pt;color:#3d6b5e;margin-bottom:4pt}h2{font-size:10pt;color:#3d6b5e;border-bottom:1px solid #3d6b5e;padding-bottom:3pt;margin-top:12pt}table{width:100%;border-collapse:collapse;font-size:9.5pt}td,th{padding:4pt 7pt;border:1px solid #ccc}th{background:#e8f0ed;color:#3d6b5e;font-weight:700;text-align:left}.info{font-size:8.5pt;color:#666}footer{margin-top:16pt;font-size:7.5pt;color:#aaa;border-top:1px solid #eee;padding-top:5pt;text-align:center}@page{margin:1.5cm;size:A4}</style></head><body>');
    w.document.write(el.innerHTML);
    w.document.write('<footer>GeriScope CGA Platform — Scheda '+h.title+' — Documento riservato ad uso clinico</footer>');
    w.document.write('</body></html>');
    w.document.close();
    setTimeout(()=>w.print(),400);
  }
  const ts=(t)=>({padding:"8px 16px",fontSize:12,fontWeight:500,cursor:"pointer",
    border:"none",borderBottom:tab===t?"2.5px solid var(--sage)":"2.5px solid transparent",
    background:"transparent",color:tab===t?"var(--sage)":"var(--gray)",
    fontFamily:"'DM Sans',sans-serif",transition:"all .15s"});
  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(13,22,20,.65)",
      backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-start",justifyContent:"center",
      padding:"36px 16px",overflowY:"auto"}}
      onClick={e=>{if(e.target===e.currentTarget)setHelpId(null);}}>
      <div style={{background:"var(--white)",borderRadius:4,width:"100%",maxWidth:700,
        boxShadow:"0 24px 70px rgba(0,0,0,.35)",maxHeight:"88vh",display:"flex",flexDirection:"column"}}>
        <div style={{background:"var(--ink)",borderRadius:"4px 4px 0 0",
          padding:"16px 22px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
          <div>
            <div className="serif" style={{fontSize:17,color:"white",fontWeight:600,lineHeight:1.2}}>{h.title}</div>
            {h.developed&&<div className="mono" style={{fontSize:8.5,color:"rgba(255,255,255,.4)",letterSpacing:"0.07em",marginTop:3}}>{h.developed} · {h.time}</div>}
          </div>
          <button onClick={()=>setHelpId(null)} style={{background:"rgba(255,255,255,.12)",border:"none",
            color:"white",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:18,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
            fontFamily:"'DM Sans',sans-serif",lineHeight:1}}>×</button>
        </div>
        <div style={{borderBottom:"1px solid var(--border)",display:"flex",flexShrink:0}}>
          <button style={ts("guide")} onClick={()=>setTab("guide")}>Guida clinica</button>
          <button style={ts("print")} onClick={()=>setTab("print")}>Scheda stampabile</button>
        </div>
        <div style={{overflowY:"auto",padding:"18px 22px",flex:1}}>
          {tab==="guide"&&(
            <div>
              <div style={{background:"rgba(61,107,94,.07)",borderLeft:"3px solid var(--sage)",
                padding:"11px 14px",borderRadius:"0 2px 2px 0",marginBottom:14}}>
                <div className="mono" style={{fontSize:8.5,color:"var(--sage)",letterSpacing:"0.08em",marginBottom:3}}>OBIETTIVO CLINICO</div>
                <div style={{fontSize:12,lineHeight:1.65}}>{h.purpose}</div>
              </div>
              {h.scoring&&(
                <div style={{marginBottom:14}}>
                  <div className="mono" style={{fontSize:8.5,color:"var(--sage)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7}}>Interpretazione</div>
                  <div style={{background:"var(--cream)",borderRadius:2,padding:"9px 13px",
                    fontSize:11.5,lineHeight:1.9,whiteSpace:"pre-line",fontFamily:"'DM Mono',monospace"}}>{h.scoring}</div>
                </div>
              )}
              {h.admin&&h.admin.length>0&&(
                <div style={{marginBottom:14}}>
                  <div className="mono" style={{fontSize:8.5,color:"var(--sage)",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7}}>Come si somministra</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {h.admin.map((step,i)=>(
                      <div key={i} style={{display:"flex",gap:9,alignItems:"flex-start",
                        padding:"7px 11px",background:"var(--white)",borderRadius:2,border:"1px solid var(--border)"}}>
                        <span className="mono" style={{fontSize:8.5,color:"var(--sage)",fontWeight:600,
                          flexShrink:0,marginTop:2,minWidth:14}}>{i+1}.</span>
                        <span style={{fontSize:11.5,lineHeight:1.6,whiteSpace:"pre-line"}}>{step}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {h.notes&&(
                <div style={{background:"rgba(201,168,76,.08)",border:"1px solid rgba(201,168,76,.25)",
                  borderRadius:2,padding:"9px 13px",marginBottom:10}}>
                  <div className="mono" style={{fontSize:8.5,color:"var(--gold)",letterSpacing:"0.08em",marginBottom:3}}>NOTE CLINICHE</div>
                  <div style={{fontSize:11.5,lineHeight:1.65,whiteSpace:"pre-line"}}>{h.notes}</div>
                </div>
              )}
              {h.correction&&<div style={{fontSize:10.5,color:"var(--gray)",fontStyle:"italic",marginTop:4}}>Correzione: {h.correction}</div>}
            </div>
          )}
          {tab==="print"&&(
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:11.5,color:"var(--gray)"}}>Scheda per somministrazione al letto del paziente</div>
                <button onClick={printForm} style={{padding:"8px 18px",background:"var(--sage)",color:"white",
                  border:"none",borderRadius:2,cursor:"pointer",fontSize:12,fontWeight:500,
                  fontFamily:"'DM Sans',sans-serif"}}>Stampa PDF</button>
              </div>
              <div id="helpPrintArea" style={{background:"white",border:"1px solid var(--border)",
                borderRadius:2,padding:"18px",fontSize:10.5}}>
                <div style={{borderBottom:"2px solid #3d6b5e",paddingBottom:8,marginBottom:12}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#3d6b5e",marginBottom:6}}>{h.title}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                    {["Paziente","Data di nascita","Data somministrazione","Somministratore"].map(f=>(
                      <div key={f} style={{display:"flex",alignItems:"center",gap:5}}>
                        <span style={{color:"#666",minWidth:130,fontSize:9.5}}>{f}:</span>
                        <div style={{flex:1,borderBottom:"1px solid #ccc",height:16}}/>
                      </div>
                    ))}
                  </div>
                </div>
                {h.svgItems&&h.svgItems.includes("tmt")&&(
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:3}}>Trail Making Test B — Collegare alternando numeri e lettere (senza staccare la matita)</div>
                    {SVG_TMT}
                  </div>
                )}
                {h.svgItems&&h.svgItems.includes("cube")&&(
                  <div style={{marginBottom:10,display:"flex",gap:16,alignItems:"flex-start"}}>
                    <div><div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:3}}>Modello da copiare</div>{SVG_CUBE}</div>
                    <div style={{flex:1}}><div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:3}}>Disegno del paziente</div><div style={{width:"100%",height:140,border:"1px solid #ccc",borderRadius:2}}/></div>
                  </div>
                )}
                {h.svgItems&&(h.svgItems.includes("clock")||h.svgItems.includes("pentagons"))&&(
                  <div style={{marginBottom:10,display:"flex",gap:16,alignItems:"flex-start"}}>
                    {h.svgItems.includes("clock")&&(
                      <div><div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:3}}>Orologio — Disegna le lancette alle 11:10</div>{SVG_CLOCK_BLANK}</div>
                    )}
                    {h.svgItems.includes("pentagons")&&(
                      <div>
                        <div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:3}}>Modello pentagoni</div>
                        {SVG_PENTAGONS}
                        <div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:3,marginTop:6}}>Copia del paziente</div>
                        <div style={{width:220,height:100,border:"1px solid #ccc",borderRadius:2}}/>
                      </div>
                    )}
                  </div>
                )}
                {h.words5&&(
                  <div style={{marginBottom:10,background:"#f0f7f4",borderRadius:2,padding:"8px 11px",border:"1px solid #b8d4ca"}}>
                    <div style={{fontSize:9.5,fontWeight:700,color:"#3d6b5e",marginBottom:4}}>5 Parole da memorizzare — leggere lentamente (1 parola ogni 2 secondi)</div>
                    <div style={{display:"flex",gap:14}}>
                      {h.words5.map(w=><span key={w} style={{fontSize:13,fontWeight:700,letterSpacing:"0.06em",color:"#3d6b5e"}}>{w}</span>)}
                    </div>
                    <div style={{fontSize:8.5,color:"#666",marginTop:3}}>Chiedere di memorizzarle. Verranno richieste al termine del test.</div>
                  </div>
                )}
                {h.printItems?(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:9.5}}>
                    <thead><tr style={{background:"#e8f0ed"}}>
                      <th style={{padding:"4px 7px",textAlign:"left",color:"#3d6b5e",border:"1px solid #ccc",width:"55%"}}>Item</th>
                      <th style={{padding:"4px 7px",textAlign:"center",color:"#3d6b5e",border:"1px solid #ccc",width:"12%"}}>Pt</th>
                      <th style={{padding:"4px 7px",textAlign:"left",color:"#3d6b5e",border:"1px solid #ccc"}}>Risposta / Note</th>
                    </tr></thead>
                    <tbody>
                      {h.printItems.map((cat,ci)=>(
                        <React.Fragment key={ci}>

function YesNo({value,onChange}){
  return(
    <div style={{display:"flex",gap:8,minWidth:160}}>
      {["yes","no"].map(v=>(
        <button key={v} onClick={()=>onChange(v)}
          style={{flex:1,padding:"7px 0",border:`1.5px solid ${value===v?"var(--sage)":"var(--border)"}`,
            borderRadius:2,cursor:"pointer",fontSize:12,fontWeight:500,
            background:value===v?"var(--sage)":"transparent",
            color:value===v?"white":"var(--gray)",
            fontFamily:"'DM Sans',sans-serif",transition:"all .15s"}}>
          {v==="yes"?"✓ Yes":"✗ No"}
        </button>
      ))}
    </div>
  );
}
function RadioCol({name,opts,value,onChange}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      {opts.map(o=>(
        <label key={o.s} style={{display:"flex",alignItems:"center",gap:10,
          padding:"7px 10px",borderRadius:2,cursor:"pointer",
          background:value===String(o.s)?"var(--sage-pale)":"transparent",
          border:`1px solid ${value===String(o.s)?"rgba(61,107,94,.5)":"var(--border)"}`,
          transition:"all .12s"}}>
          <input type="radio" name={name} value={String(o.s)} checked={value===String(o.s)}
            onChange={e=>onChange(e.target.value)}
            style={{accentColor:"var(--sage)",width:13,height:13,flexShrink:0}}/>
          <span style={{fontSize:12,color:value===String(o.s)?"var(--sage)":"var(--ink)"}}>
            <span className="mono" style={{fontSize:9,color:"var(--gray)",marginRight:5}}>[{o.s}]</span>
            {o.l}
          </span>
        </label>
      ))}
    </div>
  );
}
function ScoreResult({label,score,max,interp,show}){
  if(!show)return null;
  return(
    <div style={{background:interp.bg,border:`1px solid ${interp.color}44`,
      borderRadius:3,padding:"14px 18px",marginTop:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span className="mono" style={{fontSize:10,color:interp.color,
          letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</span>
        <span style={{fontSize:12,fontWeight:600,color:interp.color}}>{interp.label}</span>
      </div>
      <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:8}}>
        <span className="serif" style={{fontSize:36,fontWeight:300,color:interp.color,lineHeight:1}}>
          {typeof score==="number"?score:score}
        </span>
        {max&&<span style={{fontSize:13,color:interp.color,opacity:.6}}>/{max}</span>}
      </div>
      {max&&typeof score==="number"&&(
        <div style={{height:4,background:"rgba(0,0,0,.08)",borderRadius:2}}>
          <div style={{width:`${Math.min(100,(score/max)*100)}%`,height:"100%",
            background:interp.color,borderRadius:2,transition:"width .5s"}}/>
        </div>
      )}
    </div>
  );
}
function ScaleHeader({title,subtitle,badge,helpId}){

    <div style={{marginBottom:20,paddingBottom:16,borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>

              background:"transparent",color:"var(--sage)",cursor:"pointer",
              fontSize:13,fontWeight:700,display:"flex",alignItems:"center",

  const ans=MMSE.filter(i=>d[i.id]!==undefined).length;
  return(
    <div className="fu">
      <ScaleHeader title="MMSE" helpId="mmse" subtitle="Mini-Mental State Examination · Max 30 · ~10 min" badge="30 items"/>
      {doms.map(dom=>(
        <div key={dom} style={{marginBottom:16}}>
          <DomainLabel color="var(--sage)" text={dom}/>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {MMSE.filter(i=>i.dom===dom).map(item=>(
              <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,
                padding:"8px 12px",borderRadius:2,

function ClockPanel({d,set}){
  const done=d.clock_draw!==undefined&&d.clock_num!==undefined&&d.clock_hands!==undefined;
  const sc=(Number(d.clock_draw)||0)+(Number(d.clock_num)||0)+(Number(d.clock_hands)||0);
  function clockInterp(s){
    if(s===3)return{label:"Normal",        color:"var(--green)",bg:"rgba(39,174,96,.1)"};
    if(s===2)return{label:"Mild error",    color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
    return        {label:"Abnormal clock", color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  }
  return(
    <div className="fu">
      <ScaleHeader title="Clock Drawing Test" helpId="clock" subtitle="Visuospatial & executive screening · Max 3 · ~3 min" badge="CDT"/>
      <div style={{background:"var(--sage-pale)",border:"1px solid rgba(61,107,94,.2)",
        borderRadius:2,padding:"14px",marginBottom:16,fontSize:12,color:"var(--gray)",lineHeight:1.7}}>
        Ask the patient to draw a clock with all numbers and set the hands to <strong>11:10</strong>.
        Score each element separately below.
      </div>
      {[
        {key:"clock_draw", label:"Clock contour / overall shape"},
        {key:"clock_num",  label:"Numbers (1–12, correct position)"},
        {key:"clock_hands",label:"Hands (pointing to 11 and 2)"},
      ].map(row=>(
        <div key={row.key} style={{background:"var(--white)",border:"1px solid var(--border)",
          borderRadius:2,padding:"14px",marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>{row.label}</div>
          <RadioCol name={row.key} opts={[{s:1,l:"Correct [1]"},{s:0,l:"Incorrect [0]"}]}
            value={d[row.key]} onChange={v=>set(p=>({...p,[row.key]:v}))}/>
        </div>
      ))}
      <ScoreResult label="CDT" score={sc} max={3} interp={clockInterp(sc)} show={done}/>
    </div>
  );
}

function IADLPanel({d,set}){
  const maxSc=IADL.reduce((s,i)=>s+Math.max(...i.opts.map(o=>o.s)),0);
  const sc=IADL.reduce((s,i)=>d[i.id]!==undefined?s+Number(d[i.id]):s,0);
  const ans=IADL.filter(i=>d[i.id]!==undefined).length;
  function iadlInterp(s){
    const p=s/maxSc;
    if(p>=0.9)return{label:"Full independence",  color:"var(--green)",bg:"rgba(39,174,96,.1)"};
    if(p>=0.6)return{label:"Mild dependence",    color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
    if(p>=0.3)return{label:"Moderate dependence",color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
    return         {label:"Severe dependence",   color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
  }
  return(
    <div className="fu">
      <ScaleHeader title="IADL — Lawton Scale" helpId="iadl" subtitle="Instrumental activities · 8 domains" badge="8 items"/>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {IADL.map(item=>(
          <div key={item.id} style={{background:"var(--white)",border:"1px solid var(--border)",borderRadius:2,padding:"12px"}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>{item.label}</div>
            <RadioCol name={item.id} opts={item.opts} value={d[item.id]}
              onChange={v=>set(p=>({...p,[item.id]:v}))}/>
          </div>
        ))}
      </div>
      <ScoreResult label="IADL" score={sc} max={maxSc} interp={iadlInterp(sc)} show={ans===8}/>
    </div>
  );
}

function TUGPanel({d,set}){
  const n=parseFloat(d.tug_s);
  function tugInterp(s){
    if(isNaN(s))return null;
    if(s<10)return{label:"Normal — low fall risk",         color:"var(--green)",bg:"rgba(39,174,96,.1)"};
    if(s<20)return{label:"Good mobility — some fall risk", color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
    if(s<30)return{label:"Mobility problem — high risk",   color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
    return       {label:"Poor mobility — very high risk",  color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
  }
  const interp=tugInterp(n);
  return(
    <div className="fu">
      <ScaleHeader title="Timed Up & Go (TUG)" helpId="tug" subtitle="Stand, walk 3 m, turn, return, sit down. Record total time." badge="Timed"/>
      <div style={{background:"var(--white)",border:"1px solid var(--border)",borderRadius:2,padding:"20px"}}>
        <div style={{fontSize:12,color:"var(--gray)",marginBottom:16,lineHeight:1.7}}>
          Patient starts seated with arms on chair. On command <strong>"Go"</strong>: stand up, walk 3 metres,
          turn, walk back, sit down. Time from "Go" to fully seated.
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div>
            <label style={{fontSize:12,color:"var(--gray)",display:"block",marginBottom:6}}>Time (seconds)</label>
            <input type="number" min="0" step="0.1" value={d.tug_s||""}
              onChange={e=>set(p=>({...p,tug_s:e.target.value}))}
              placeholder="e.g. 12.5"
              style={{padding:"10px 14px",border:"1px solid var(--border)",borderRadius:2,
                fontSize:16,width:140,background:"var(--cream)"}}/>
          </div>
          <div style={{fontSize:11,color:"var(--gray)",lineHeight:1.8,marginTop:16}}>
            &lt; 10s — Normal · 10–20s — Mild risk · &gt; 20s — High risk
          </div>
        </div>
      </div>
      {interp&&(
        <div style={{marginTop:12,background:interp.bg,border:`1px solid ${interp.color}44`,
          borderRadius:3,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          <span className="serif" style={{fontSize:28,fontWeight:300,color:interp.color}}>{d.tug_s}s</span>
          <span style={{fontSize:13,fontWeight:500,color:interp.color}}>{interp.label}</span>
        </div>
      )}
    </div>
  );
}

function TinettiPanel({d,set}){
  const items=[
    {id:"ti1",label:"Sitting balance",       opts:[{s:0,l:"Leans/slides"},{s:1,l:"Steady, safe"}]},
    {id:"ti2",label:"Rise from chair",       opts:[{s:0,l:"Unable"},{s:1,l:"Uses arms"},{s:2,l:"Without arms"}]},
    {id:"ti3",label:"Standing balance (immediate)",opts:[{s:0,l:"Unsteady"},{s:1,l:"Steady with support"},{s:2,l:"Steady, no support"}]},
    {id:"ti4",label:"Balance — eyes closed", opts:[{s:0,l:"Unsteady"},{s:1,l:"Steady"}]},
    {id:"ti5",label:"Nudge (sternum push)",  opts:[{s:0,l:"Falls"},{s:1,l:"Grabs / catches self"},{s:2,l:"Steady"}]},
    {id:"ti6",label:"Turning 360°",          opts:[{s:0,l:"Discontinuous steps"},{s:1,l:"Continuous, steady"}]},
    {id:"ti7",label:"Sit down",              opts:[{s:0,l:"Unsafe"},{s:1,l:"Uses arms"},{s:2,l:"Safe, smooth"}]},
    {id:"ti8",label:"Gait initiation",       opts:[{s:0,l:"Hesitation/multiple attempts"},{s:1,l:"No hesitation"}]},
    {id:"ti9",label:"Step symmetry",         opts:[{s:0,l:"Asymmetric"},{s:1,l:"Steps appear equal"}]},
    {id:"ti10",label:"Step continuity",      opts:[{s:0,l:"Stopping/discontinuous"},{s:1,l:"Continuous"}]},
    {id:"ti11",label:"Path (3m)",            opts:[{s:0,l:"Marked deviation"},{s:1,l:"Mild or uses aid"},{s:2,l:"Straight, no aid"}]},
    {id:"ti12",label:"Trunk stability",      opts:[{s:0,l:"Marked sway"},{s:1,l:"No sway, flexes knees"},{s:2,l:"No sway, steady"}]},
  ];
  const sc=items.reduce((s,i)=>d[i.id]!==undefined?s+Number(d[i.id]):s,0);
  const ans=items.filter(i=>d[i.id]!==undefined).length;
  function tInterp(s){
    if(s>=25)return{label:"Low fall risk",      color:"var(--green)",bg:"rgba(39,174,96,.1)"};
    if(s>=19)return{label:"Moderate fall risk", color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
    return        {label:"High fall risk",      color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  }
  return(
    <div className="fu">
      <ScaleHeader title="Tinetti / Fall Risk" helpId="tinetti" subtitle="Balance + Gait assessment · Max 28 · ≥25 = low fall risk" badge="12 items"/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {items.map(item=>(
          <div key={item.id} style={{background:"var(--white)",border:"1px solid var(--border)",borderRadius:2,padding:"12px"}}>
            <div style={{fontSize:12,fontWeight:500,marginBottom:8}}>{item.label}</div>
            <RadioCol name={item.id} opts={item.opts} value={d[item.id]}
              onChange={v=>set(p=>({...p,[item.id]:v}))}/>
          </div>
        ))}
      </div>
      <ScoreResult label="Tinetti" score={sc} max={28} interp={tInterp(sc)} show={ans===12}/>
    </div>
  );
}

function CharlsonPanel({d,set}){
  const sc=CHARLSON.reduce((s,i)=>d[i.id]?s+i.w:s,0);
  const pt=getAge(PATIENT.dob);
  function survival(s,a){
    const adj=s+(a>=80?4:a>=70?3:a>=60?2:a>=50?1:0);
    if(adj===0)return"98%"; if(adj<=2)return"89%"; if(adj<=4)return"79%";
    if(adj<=5)return"64%"; return"<53%";
  }
  function getAge(dob){const b=new Date(dob),n=new Date();let a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a;}
  return(
    <div className="fu">
      <ScaleHeader title="Charlson Comorbidity Index" helpId="charlson" subtitle="Weighted comorbidities → estimated 10-year survival" badge="CCI"/>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {CHARLSON.map(item=>(
          <label key={item.id} style={{display:"flex",alignItems:"center",gap:10,
            padding:"8px 12px",borderRadius:2,cursor:"pointer",
            background:d[item.id]?"var(--sage-pale)":"var(--white)",
            border:`1px solid ${d[item.id]?"rgba(61,107,94,.4)":"var(--border)"}`,
            transition:"all .12s"}}>
            <input type="checkbox" checked={!!d[item.id]}
              onChange={e=>set(p=>({...p,[item.id]:e.target.checked}))}
              style={{accentColor:"var(--sage)",width:13,height:13,flexShrink:0}}/>
            <span style={{flex:1,fontSize:12}}>{item.label}</span>
            <span className="mono" style={{fontSize:10,color:"var(--gray)",background:"var(--cream)",
              padding:"1px 6px",borderRadius:2}}>+{item.w}</span>
          </label>
        ))}
      </div>
      {sc>0&&(
        <div style={{marginTop:14,background:"var(--sage-pale)",border:"1px solid rgba(61,107,94,.2)",
          borderRadius:3,padding:"14px 18px",display:"flex",gap:32}}>
          <div><div className="mono" style={{fontSize:9,color:"var(--gray)",letterSpacing:"0.08em"}}>CCI SCORE</div>
            <div className="serif" style={{fontSize:32,fontWeight:300,color:"var(--sage)"}}>{sc}</div></div>
          <div><div className="mono" style={{fontSize:9,color:"var(--gray)",letterSpacing:"0.08em"}}>10-YR SURVIVAL (EST.)</div>
            <div className="serif" style={{fontSize:32,fontWeight:300,
              color:parseInt(survival(sc,pt))<70?"var(--red)":"var(--green)"}}>{survival(sc,pt)}</div></div>
        </div>
      )}
    </div>
  );
}

function BeersPanel({d,set}){
  const BEERS_DRUGS=[
    {drug:"Benzodiazepines",   reason:"Fall risk, cognitive impairment, delirium"},
    {drug:"Antipsychotics",    reason:"Stroke risk, mortality in dementia patients"},
    {drug:"Anticholinergics",  reason:"Confusion, urinary retention, constipation"},
    {drug:"NSAIDs",            reason:"GI bleeding, renal impairment, fluid retention"},
    {drug:"Digoxin > 0.125mg/day",reason:"Narrow therapeutic index, toxicity risk"},
    {drug:"Sulfonylureas (long-acting)",reason:"Hypoglycaemia risk"},
    {drug:"Tricyclic antidepressants",reason:"Orthostatic hypotension, arrhythmia"},
    {drug:"Muscle relaxants",  reason:"Sedation, fall risk"},
    {drug:"Amiodarone",        reason:"Thyroid dysfunction, pulmonary toxicity"},
    {drug:"Warfarin",          reason:"Bleeding risk — reassess need"},
  ];
  const flagged=PATIENT.medications.map(med=>{
    const hit=BEERS_DRUGS.find(b=>med.toLowerCase().includes(b.drug.toLowerCase().split(" ")[0].toLowerCase()));
    return hit?{med,reason:hit.reason}:null;
  }).filter(Boolean);
  const n=Number(d.poly_n)||0;
  return(
    <div className="fu">
      <ScaleHeader title="Polypharmacy & Beers Criteria" helpId="beers" subtitle="Medication review and inappropriate drug detection" badge="Auto-check"/>
      <div style={{background:"var(--white)",border:"1px solid var(--border)",borderRadius:2,padding:"16px",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Number of daily medications</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <input type="number" min="0" value={d.poly_n||""}
            onChange={e=>set(p=>({...p,poly_n:e.target.value}))}
            style={{padding:"8px 12px",border:"1px solid var(--border)",borderRadius:2,
              fontSize:16,width:100,background:"var(--cream)"}}/>
          {n>0&&(
            <div style={{fontSize:12,padding:"4px 12px",borderRadius:20,
              background:n>=10?"rgba(192,57,43,.1)":n>=5?"rgba(230,126,34,.1)":"rgba(39,174,96,.1)",
              color:n>=10?"var(--red)":n>=5?"var(--amber)":"var(--green)"}}>
              {n>=10?"Excessive polypharmacy":n>=5?"Polypharmacy":"No polypharmacy"}
            </div>
          )}
        </div>
        <div style={{fontSize:11,color:"var(--gray)",marginTop:8}}>≥5 = polypharmacy · ≥10 = excessive</div>
      </div>
      {flagged.length>0&&(
        <div style={{background:"rgba(192,57,43,.06)",border:"1px solid rgba(192,57,43,.2)",
          borderRadius:3,padding:"14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
            <span style={{color:"var(--red)",animation:"pulse 2s ease-in-out infinite"}}>⚠</span>
            <span className="mono" style={{fontSize:10,color:"var(--red)",letterSpacing:"0.1em"}}>
              {flagged.length} BEERS CRITERIA ALERT{flagged.length>1?"S":""}
            </span>
          </div>
          {flagged.map(a=>(
            <div key={a.med} style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(192,57,43,.1)"}}>
              <div style={{fontSize:13,fontWeight:600,color:"var(--red)"}}>{a.med}</div>
              <div style={{fontSize:11,color:"var(--gray)",marginTop:2}}>{a.reason}</div>
            </div>
          ))}
        </div>
      )}
      {flagged.length===0&&(
        <div style={{background:"rgba(39,174,96,.08)",border:"1px solid rgba(39,174,96,.2)",
          borderRadius:2,padding:"12px 16px",fontSize:12,color:"var(--green)"}}>
          ✓ No Beers criteria alerts detected for current medication list.
        </div>
      )}
    </div>
  );
}

// Percentile data extracted from clinical reference charts
// © GeriScope — Handgrip Percentile Normative Data
const HG_AGES = [10,15,20,25,30,35,40,45,50,55,60,65,70,75,80];
const HG_DATA = {
  M: {
    p10: [20.0,32.7,37.8,37.6,35.9,35.7,35.4,34.4,32.9,32.1,31.0,29.7,28.4,27.1,25.9],
    p50: [23.3,38.9,43.9,43.8,42.7,42.5,42.2,40.8,39.0,38.2,36.5,34.9,33.5,32.0,30.6],
    p90: [26.7,45.3,49.9,49.9,49.4,49.2,49.0,47.3,45.1,44.2,42.1,40.2,38.5,36.9,35.3],
    yMin:14, yMax:54, color:"#2563eb", fill:"rgba(37,99,235,0.10)", label:"Maschi"
  },
  F: {
    p10: [15.0,19.1,22.7,24.1,23.2,22.3,20.9,20.5,19.9,19.6,18.4,17.9,17.7,17.6,17.4],
    p50: [19.1,24.0,29.1,31.2,28.8,27.8,26.7,26.3,25.8,25.5,23.6,22.7,22.3,22.0,21.6],
    p90: [23.3,29.0,35.5,38.5,34.4,33.3,32.5,32.2,31.8,31.3,28.8,27.5,26.9,26.3,25.7],
    yMin:10, yMax:42, color:"#d97706", fill:"rgba(217,119,6,0.10)", label:"Femmine"
  }
};

function hgInterp(arr, age){
  if(age<=HG_AGES[0]) return arr[0];
  if(age>=HG_AGES[HG_AGES.length-1]) return arr[arr.length-1];
  for(let i=0;i<HG_AGES.length-1;i++){
    if(age>=HG_AGES[i]&&age<=HG_AGES[i+1]){
      const t=(age-HG_AGES[i])/(HG_AGES[i+1]-HG_AGES[i]);
      return arr[i]+t*(arr[i+1]-arr[i]);
    }
  }
  return arr[0];
}

function hgPercentileLabel(grip, age, gender){
  const G = gender==="F"?"F":"M";
  const d = HG_DATA[G];
  const p10v = hgInterp(d.p10, age);
  const p50v = hgInterp(d.p50, age);
  const p90v = hgInterp(d.p90, age);
  if(grip < p10v)  return {label:"Sotto P10 — forza ridotta",  color:"#c0392b", pct:"<P10"};
  if(grip < p50v)  return {label:"P10–P50",                    color:"#e67e22", pct:"P10-P50"};
  if(grip <= p90v) return {label:"P50–P90 — nella norma",      color:"#27ae60", pct:"P50-P90"};
  return                  {label:"Sopra P90 — forza elevata",  color:"#1a7a4a", pct:">P90"};
}

function HandgripChart({age, grip, gender, compact}){
  const G = gender==="F"?"F":"M";
  const d = HG_DATA[G];
  const W = compact ? 480 : 560;
  const H = compact ? 260 : 300;
  const ML=52, MR=38, MT=18, MB=42;
  const CW=W-ML-MR, CH=H-MT-MB;
  const xPx = a  => ML+(a-10)/70*CW;
  const yPx = kg => MT+CH-(kg-d.yMin)/(d.yMax-d.yMin)*CH;
  const linePts = arr => HG_AGES.map((a,i)=>xPx(a).toFixed(1)+","+yPx(arr[i]).toFixed(1)).join(" ");
  const bandPath = () => {
    const top = HG_AGES.map((a,i)=>xPx(a).toFixed(1)+","+yPx(d.p90[i]).toFixed(1)).join(" L ");
    const bot = [...HG_AGES].reverse().map((a,i,ar)=>{const idx=HG_AGES.length-1-i;return xPx(a).toFixed(1)+","+yPx(d.p10[idx]).toFixed(1);}).join(" L ");
    return "M "+top+" L "+bot+" Z";
  };
  const xTicks=[10,20,30,40,50,60,70,80];
  const yStep = G==="M" ? 5 : 5;
  const yTicks=[];
  for(let y=Math.ceil(d.yMin/5)*5;y<=d.yMax;y+=yStep) yTicks.push(y);

  const hasPoint = age&&grip&&!isNaN(age)&&!isNaN(grip);
  const ptInfo = hasPoint ? hgPercentileLabel(grip, age, G) : null;
  const dotX = hasPoint ? xPx(age) : null;
  const dotY = hasPoint ? yPx(grip) : null;
  // clamp dot inside chart
  const dotXc = hasPoint ? Math.max(ML, Math.min(ML+CW, dotX)) : null;
  const dotYc = hasPoint ? Math.max(MT, Math.min(MT+CH, dotY)) : null;
  // label position: flip if too close to right edge
  const lblRight = dotXc && dotXc > ML+CW-80;

  return(
    <svg width={W} height={H} viewBox={"0 0 "+W+" "+H}
      style={{display:"block",maxWidth:"100%",fontFamily:"'DM Sans',sans-serif"}}>

      {/* Grid */}
      {xTicks.map(a=>(
        <line key={"gx"+a} x1={xPx(a)} y1={MT} x2={xPx(a)} y2={MT+CH}
          stroke="#e5e7eb" strokeWidth="1" strokeDasharray="3,3"/>
      ))}
      {yTicks.map(kg=>(
        <line key={"gy"+kg} x1={ML} y1={yPx(kg)} x2={ML+CW} y2={yPx(kg)}
          stroke="#e5e7eb" strokeWidth="1" strokeDasharray="3,3"/>
      ))}

      {/* Band P10–P90 */}
      <path d={bandPath()} fill={d.fill} stroke="none"/>

      {/* Curves */}
      <polyline points={linePts(d.p90)} fill="none" stroke={d.color}
        strokeWidth="1.5" strokeDasharray="6,3" opacity="0.65"/>
      <polyline points={linePts(d.p50)} fill="none" stroke={d.color} strokeWidth="2.5"/>
      <polyline points={linePts(d.p10)} fill="none" stroke={d.color}
        strokeWidth="1.5" strokeDasharray="6,3" opacity="0.65"/>

      {/* Axes */}
      <line x1={ML} y1={MT} x2={ML} y2={MT+CH} stroke="#9ca3af" strokeWidth="1.5"/>
      <line x1={ML} y1={MT+CH} x2={ML+CW} y2={MT+CH} stroke="#9ca3af" strokeWidth="1.5"/>

      {/* X axis labels */}
      {xTicks.map(a=>(
        <g key={"lx"+a}>
          <line x1={xPx(a)} y1={MT+CH} x2={xPx(a)} y2={MT+CH+4} stroke="#9ca3af" strokeWidth="1"/>
          <text x={xPx(a)} y={MT+CH+16} textAnchor="middle" fontSize="10" fill="#6b7280">{a}</text>
        </g>
      ))}

      {/* Y axis labels */}
      {yTicks.filter((_,i)=>i%2===0).map(kg=>(
        <g key={"ly"+kg}>
          <line x1={ML-4} y1={yPx(kg)} x2={ML} y2={yPx(kg)} stroke="#9ca3af" strokeWidth="1"/>
          <text x={ML-7} y={yPx(kg)+4} textAnchor="end" fontSize="10" fill="#6b7280">{kg}</text>
        </g>
      ))}

      {/* Axis titles */}
      <text x={ML+CW/2} y={H-6} textAnchor="middle" fontSize="11" fill="#374151">
        {"\u0045\u0074\u00e0 (anni)"}
      </text>
      <text x={12} y={MT+CH/2} textAnchor="middle" fontSize="11" fill="#374151"
        transform={"rotate(-90 12 "+(MT+CH/2)+")"}>
        Forza di presa (kg)
      </text>

      {/* P labels on right */}
      <text x={ML+CW+3} y={yPx(d.p90[14])+4} fontSize="9" fill={d.color} opacity="0.7" fontWeight="600">P90</text>
      <text x={ML+CW+3} y={yPx(d.p50[14])+4} fontSize="9" fill={d.color} fontWeight="600">P50</text>
      <text x={ML+CW+3} y={yPx(d.p10[14])+4} fontSize="9" fill={d.color} opacity="0.7" fontWeight="600">P10</text>

      {/* Patient dot */}
      {hasPoint&&(
        <g>
          <line x1={dotXc} y1={MT} x2={dotXc} y2={dotYc}
            stroke={ptInfo.color} strokeWidth="1" strokeDasharray="4,2" opacity="0.45"/>
          <line x1={ML} y1={dotYc} x2={dotXc} y2={dotYc}
            stroke={ptInfo.color} strokeWidth="1" strokeDasharray="4,2" opacity="0.45"/>
          <circle cx={dotXc} cy={dotYc} r="9" fill={ptInfo.color} opacity="0.18"/>
          <circle cx={dotXc} cy={dotYc} r="5.5" fill={ptInfo.color} stroke="white" strokeWidth="2"/>
          <rect x={lblRight?dotXc-68:dotXc+10} y={dotYc-13} width="58" height="17"
            rx="3" fill="white" stroke={ptInfo.color} strokeWidth="1" opacity="0.95"/>
          <text x={lblRight?dotXc-39:dotXc+39} y={dotYc-1}
            textAnchor="middle" fontSize="9.5" fill={ptInfo.color} fontWeight="700">
            {grip} kg [{ptInfo.pct}]
          </text>
        </g>
      )}

      {/* Legend */}
      <g transform={"translate("+(ML+10)+","+(MT+10)+")"}>
        <rect x="0" y="0" width="118" height="56" rx="3"
          fill="white" stroke="#e5e7eb" strokeWidth="1" opacity="0.95"/>
        <line x1="6" y1="13" x2="22" y2="13" stroke={d.color} strokeWidth="2.5"/>
        <text x="26" y="16" fontSize="9" fill="#374151">P50 — mediana</text>
        <line x1="6" y1="27" x2="22" y2="27" stroke={d.color} strokeWidth="1.5" strokeDasharray="4,2" opacity="0.65"/>
        <text x="26" y="30" fontSize="9" fill="#374151">P10 / P90</text>
        <rect x="6" y="37" width="16" height="9" fill={d.fill} stroke={d.color} strokeWidth="0.5"/>
        <text x="26" y="45" fontSize="9" fill="#374151">Fascia normale</text>
      </g>

      {/* Copyright */}
      <text x={ML+CW} y={H-8} textAnchor="end" fontSize="7.5" fill="#9ca3af" fontStyle="italic">
        GeriScope Handgrip Percentile Chart
      </text>
    </svg>
  );
}
