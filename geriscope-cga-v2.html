function BradenPanel({d,set}){
  const items=[
    {id:"br_sens",label:"Sensory Perception",
     opts:[{s:1,l:"Completely limited — no response to pain"},{s:2,l:"Very limited — responds only to pain"},{s:3,l:"Slightly limited — responds to verbal but can't always communicate"},{s:4,l:"No impairment — responds normally"}]},
    {id:"br_mois",label:"Moisture",
     opts:[{s:1,l:"Constantly moist — damp nearly every turn"},{s:2,l:"Very moist — change linen at least once a shift"},{s:3,l:"Occasionally moist — extra linen change once a day"},{s:4,l:"Rarely moist — skin usually dry"}]},
    {id:"br_act", label:"Activity",
     opts:[{s:1,l:"Bedfast — confined to bed"},{s:2,l:"Chairfast — walks very little or never"},{s:3,l:"Walks occasionally — short distances"},{s:4,l:"Walks frequently — outside room at least twice daily"}]},
    {id:"br_mob", label:"Mobility",
     opts:[{s:1,l:"Completely immobile — does not make any body position changes"},{s:2,l:"Very limited — makes occasional slight changes"},{s:3,l:"Slightly limited — makes frequent but slight changes"},{s:4,l:"No limitations — makes major and frequent changes"}]},
    {id:"br_nutr",label:"Nutrition",
     opts:[{s:1,l:"Very poor — never eats a complete meal"},{s:2,l:"Probably inadequate — rarely eats half of any meal"},{s:3,l:"Adequate — eats over half of most meals"},{s:4,l:"Excellent — eats most of every meal"}]},
    {id:"br_fric",label:"Friction & Shear",
     opts:[{s:1,l:"Problem — requires moderate to maximum assistance"},{s:2,l:"Potential problem — moves feebly or requires minimum assistance"},{s:3,l:"No apparent problem — moves in bed and chair independently"}]},
  ];
  function bradenInterp(s){
    if(s>=19)return{label:"Low risk",          color:"var(--green)",bg:"rgba(39,174,96,.1)"};
    if(s>=15)return{label:"Mild risk",          color:"#84cc16",    bg:"rgba(132,204,22,.1)"};

    return        {label:"Very high risk",      color:"var(--red)",  bg:"rgba(192,57,43,.2)"};
  }
  const sc=items.reduce((s,i)=>d[i.id]!==undefined?s+Number(d[i.id]):s,0);
  const ans=items.filter(i=>d[i.id]!==undefined).length;
  return(
    <div className="fu">
      <ScaleHeader title="Braden Scale" helpId="braden" subtitle="Pressure Ulcer Risk Assessment. Score 6-23. Lower score = higher risk." badge="6 items"/>
      <div style={{fontSize:11,color:"var(--gray)",background:"var(--cream)",
        padding:"8px 12px",borderRadius:2,marginBottom:12}}>

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {items.map(item=>(
          <div key={item.id} style={{background:"var(--white)",border:"1px solid var(--border)",borderRadius:2,padding:"14px"}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>{item.label}</div>

              onChange={v=>set(p=>({...p,[item.id]:v}))}/>
          </div>
        ))}
      </div>
      <ScoreResult label="Braden" score={sc} max={23} interp={bradenInterp(sc)} show={ans===6}/>
    </div>
  );
}

// ─── MPI PANEL ────────────────────────────────────────────────────────────
// Multidimensional Prognostic Index (Pilotto 2008)
// Uses scores already computed in the VMG
function MPIPanel({d,set,allData}){
  // MPI reads scores computed elsewhere in the VMG
  // Each domain is mapped to a 0/0.5/1 grade
  // Final MPI = mean of 8 domain grades

  function grade(val, good, mild){
    // val ≤ good → 0 (best), ≤ mild → 0.5 (moderate), else → 1 (worst)
    if(val===null||val===undefined) return null;
    if(val<=good) return 0;
    if(val<=mild) return 0.5;
    return 1;
  }
  function gradeHigh(val, good, mild){
    // Higher is better (e.g. MMSE, ADL)
    if(val===null||val===undefined) return null;
    if(val>=good) return 0;
    if(val>=mild) return 0.5;
    return 1;
  }

  // Compute scores from allData
  const mmseScore = allData ? MMSE.filter(i=>allData[i.id]==="1").length : null;
  const mmseOk    = allData && MMSE.filter(i=>allData[i.id]!==undefined).length===MMSE.length;
  const adlScore  = allData ? ADL.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0) : null;
  const adlOk     = allData && ADL.every(i=>allData[i.id]!==undefined);
  const iadlMax   = IADL.reduce((s,i)=>s+Math.max(...i.opts.map(o=>o.s)),0);
  const iadlScore = allData ? IADL.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0) : null;
  const iadlOk    = allData && IADL.every(i=>allData[i.id]!==undefined);
  const iadlPct   = iadlOk ? iadlScore/iadlMax : null;
  const mnaScore  = allData ? MNA.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0) : null;
  const mnaOk     = allData && MNA.every(i=>allData[i.id]!==undefined);
  const barthelScore = allData ? BARTHEL.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0) : null;
  const barthelOk    = allData && BARTHEL.every(i=>allData[i.id]!==undefined);

  // BRASS discharge risk — use manual override or BRASS score
  const brassScore = allData ? BRASS_ITEMS.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0) : null;
  const brassOk    = allData && BRASS_ITEMS.every(i=>allData[i.id]!==undefined);

  // 8 MPI domains with their computed grades
  const DOMAINS_MPI = [
    {
      id:"mpi_adc",  label:"ADL",
      score: adlOk ? adlScore : null,
      display: adlOk ? adlScore+"/6" : null,
      grade: adlOk ? gradeHigh(adlScore, 6, 4) : null,
      source:"ADL — Katz",
      note:"0=ind. (≥6) · 0.5=parz.dip (4–5) · 1=dipendente (<4)"
    },
    {
      id:"mpi_iadl", label:"IADL",
      score: iadlOk ? iadlPct : null,
      display: iadlOk ? iadlScore+"/"+iadlMax : null,
      grade: iadlOk ? gradeHigh(iadlPct, 0.9, 0.5) : null,
      source:"IADL — Lawton",
      note:"0=ind. (≥90%) · 0.5=parz. (50–90%) · 1=dipendente (<50%)"
    },
    {
      id:"mpi_cog",  label:"Cognitivo",
      score: mmseOk ? mmseScore : null,
      display: mmseOk ? mmseScore+"/30" : null,
      grade: mmseOk ? gradeHigh(mmseScore, 24, 18) : null,
      source:"MMSE",
      note:"0=normale (≥24) · 0.5=lieve (18–23) · 1=impaired (<18)"
    },
    {
      id:"mpi_nutr", label:"Nutrizione",
      score: mnaOk ? mnaScore : null,
      display: mnaOk ? mnaScore+"/14" : null,
      grade: mnaOk ? gradeHigh(mnaScore, 12, 8) : null,
      source:"MNA-SF",
      note:"0=normale (≥12) · 0.5=a rischio (8–11) · 1=malnutrito (<8)"
    },
    {
      id:"mpi_mob",  label:"Mobilità / Barthel",
      score: barthelOk ? barthelScore : null,
      display: barthelOk ? barthelScore+"/100" : null,
      grade: barthelOk ? gradeHigh(barthelScore, 85, 60) : null,
      source:"Indice di Barthel",
      note:"0=ind. (≥85) · 0.5=moderato (60–84) · 1=dipendente (<60)"
    },
    {
      id:"mpi_social", label:"Rete Sociale",
      source:"Inserire manualmente",
      note:"0=supporto adeguato · 0.5=parziale · 1=assente/istituzionalizzato",
      manual:true,
    },
    {
      id:"mpi_med",  label:"Comorbilità / Farmaci",
      source:"Inserire manualmente",
      note:"0=≤4 farmaci, nessuna comorbilità grave · 0.5=5–9 farmaci o comorbilità mod. · 1=≥10 farmaci o comorbilità grave",
      manual:true,
    },
    {
      id:"mpi_disch", label:"Stato Dimissione (BRASS)",
      score: brassOk ? brassScore : null,
      display: brassOk ? brassScore+"/40" : null,
      grade: brassOk ? grade(brassScore, 10, 19) : null,
      source:"BRASS",
      note:"0=rischio basso (≤10) · 0.5=moderato (11–19) · 1=alto (≥20)"
    },
  ];

  // Compute MPI from available domains
  const available = DOMAINS_MPI.map(dom=>{
    if(dom.manual) return d[dom.id]!==undefined ? parseFloat(d[dom.id]) : null;
    return dom.grade;
  });
  const validGrades = available.filter(g=>g!==null);
  const mpiScore   = validGrades.length > 0
    ? Math.round((validGrades.reduce((s,g)=>s+g,0)/validGrades.length)*100)/100
    : null;

  function mpiInterp(v){
    if(v===null) return null;
    if(v<=0.33) return {label:"MPI-1 — Rischio basso",    detail:"Mortalità stimata a 1 mese <15%, a 1 anno <30%",color:"var(--green)",bg:"rgba(39,174,96,.1)"};
    if(v<=0.66) return {label:"MPI-2 — Rischio moderato",  detail:"Mortalità stimata a 1 mese 15–35%, a 1 anno 30–60%",color:"var(--amber)",bg:"rgba(230,126,34,.1)"};
    return             {label:"MPI-3 — Rischio alto",      detail:"Mortalità stimata a 1 mese >35%, a 1 anno >60%",  color:"var(--red)",  bg:"rgba(192,57,43,.1)"};
  }
  const mInterp = mpiInterp(mpiScore);

  const GRADE_LABELS = {0:"0 — Buono",0.5:"0.5 — Moderato",1:"1 — Grave"};
  const GRADE_COLORS = {0:"var(--green)",0.5:"var(--amber)",1:"var(--red)"};

  return(
    <div className="fu">
      <ScaleHeader title="MPI — Multidimensional Prognostic Index" helpId="mpi" helpId="mpi"
        subtitle="Pilotto 2008 · Indice prognostico multidimensionale · Basato sulle scale VMG già completate"
        badge="8 domini"/>
      <div style={{fontSize:11,color:"var(--gray)",background:"rgba(190,24,93,.06)",
        border:"1px solid rgba(190,24,93,.15)",
        padding:"9px 12px",borderRadius:2,marginBottom:14,lineHeight:1.65}}>
        L'MPI aggrega automaticamente i punteggi delle scale VMG già compilate.
        Per i domini manuali inserire il grado 0/0.5/1 nella colonna a destra.
      </div>

      {/* Domain table */}
      <div style={{background:"var(--white)",border:"1px solid var(--border)",
        borderRadius:3,overflow:"hidden",marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 90px 80px",
          background:"var(--sage-pale)",padding:"8px 14px",
          borderBottom:"1px solid var(--border)"}}>
          <span className="mono" style={{fontSize:9,color:"var(--sage)",letterSpacing:"0.08em"}}>DOMINIO</span>
          <span className="mono" style={{fontSize:9,color:"var(--sage)",letterSpacing:"0.08em",textAlign:"center"}}>SCORE</span>
          <span className="mono" style={{fontSize:9,color:"var(--sage)",letterSpacing:"0.08em",textAlign:"center"}}>GRADO</span>
        </div>
        {DOMAINS_MPI.map((dom,i)=>{
          const g = dom.manual ? d[dom.id] : dom.grade;
          const gNum = g!==null&&g!==undefined ? parseFloat(g) : null;
          const col = gNum!==null ? GRADE_COLORS[gNum] : "var(--gray)";
          return(
            <div key={dom.id} style={{display:"grid",gridTemplateColumns:"1fr 90px 80px",
              padding:"10px 14px",borderBottom: i<DOMAINS_MPI.length-1?"1px solid var(--border)":"none",
              background:i%2===0?"white":"rgba(0,0,0,.012)"}}>
              <div>
                <div style={{fontSize:12,fontWeight:500,marginBottom:1}}>{dom.label}</div>
                <div style={{fontSize:9,color:"var(--gray)"}}>{dom.source}</div>
              </div>
              <div style={{textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {dom.display
                  ? <span className="mono" style={{fontSize:11,color:"var(--gray)"}}>{dom.display}</span>
                  : <span style={{fontSize:10,color:"var(--border)"}}>—</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center"}}>
                {dom.manual ? (
                  <select value={d[dom.id]!==undefined?d[dom.id]:""}
                    onChange={e=>set(p=>({...p,[dom.id]:e.target.value}))}
                    style={{width:68,padding:"3px 4px",border:"1px solid var(--border)",
                      borderRadius:2,fontSize:11,background:"var(--cream)",
                      fontFamily:"'DM Sans',sans-serif",color:"var(--ink)"}}>
                    <option value="">—</option>
                    <option value="0">0</option>
                    <option value="0.5">0.5</option>
                    <option value="1">1</option>
                  </select>
                ) : (
                  gNum!==null
                    ? <span style={{fontSize:13,fontWeight:700,color:col}}>{gNum}</span>
                    : <span style={{fontSize:10,color:"var(--border)"}}>N/D</span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Tooltip grading */}
      <div style={{fontSize:10,color:"var(--gray)",background:"var(--cream)",
        padding:"8px 12px",borderRadius:2,marginBottom:14,lineHeight:1.7}}>
        <span style={{fontWeight:600}}>Scala gradi: </span>
        <span style={{color:"var(--green)",fontWeight:600}}>0 = buono</span> &nbsp;·&nbsp;
        <span style={{color:"var(--amber)",fontWeight:600}}>0.5 = moderato</span> &nbsp;·&nbsp;
        <span style={{color:"var(--red)",fontWeight:600}}>1 = grave</span>
        &nbsp;·&nbsp; MPI = media aritmetica degli 8 domini
      </div>

      {/* Live MPI score */}
      {mpiScore!==null&&mInterp&&(
        <div style={{background:mInterp.bg,border:"1px solid "+mInterp.color+"44",
          borderRadius:3,padding:"16px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:8}}>
            <div>
              <div className="mono" style={{fontSize:9,color:mInterp.color,
                letterSpacing:"0.08em",marginBottom:3}}>MPI SCORE</div>
              <div className="serif" style={{fontSize:42,fontWeight:300,
                color:mInterp.color,lineHeight:1}}>{mpiScore.toFixed(2)}</div>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:mInterp.color,marginBottom:3}}>
                {mInterp.label}
              </div>
              <div style={{fontSize:11,color:"var(--gray)",lineHeight:1.55}}>
                {mInterp.detail}
              </div>
            </div>
          </div>
          <div style={{fontSize:10,color:"var(--gray)",borderTop:"1px solid "+mInterp.color+"22",
            paddingTop:8,marginTop:4}}>
            Calcolato su {validGrades.length}/8 domini · {8-validGrades.length} domini mancanti non inclusi nel calcolo
          </div>
        </div>
      )}
      {mpiScore===null&&(
        <div style={{textAlign:"center",padding:"20px",color:"var(--gray)",fontSize:12,
          background:"var(--cream)",borderRadius:2,border:"1px dashed var(--border)"}}>
          Completa almeno 1 dominio per visualizzare il punteggio MPI
        </div>
      )}
    </div>
  );
}

              border:`1.5px solid ${d.cfs===level.n?"var(--sage)":"var(--border)"}`,
              transition:"all .12s",fontFamily:"'DM Sans',sans-serif"}}>
            <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,
              background:d.cfs===level.n?level.color:"rgba(107,123,126,.1)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,fontWeight:700,
              color:d.cfs===level.n?"white":"var(--gray)",transition:"all .12s"}}>
              {level.n}
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:d.cfs===level.n?"var(--sage)":"var(--ink)"}}>{level.label}</div>
              <div style={{fontSize:11,color:"var(--gray)",marginTop:1,lineHeight:1.4}}>{level.desc}</div>
            </div>
            {d.cfs===level.n&&<span style={{color:"var(--sage)"}}>✓</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

function ReportPanel({allData, selected}){
  const [rep, setRep] = React.useState(()=>{
    const saved = localStorage.getItem("gs_report_draft_"+(PATIENT.id||"demo"));
    return saved ? JSON.parse(saved) : {
      clinical_summary:"", cognitive_notes:"", functional_notes:"",
      clinical_notes:"", social_notes:"",
      problems:"", goals:"", interventions:"",
      responsible: PATIENT.physician||"",
      review_date:"", follow_up:""
    };
  });

  function setField(k,v){
    const next = {...rep,[k]:v};
    setRep(next);
    localStorage.setItem("gs_report_draft_"+(PATIENT.id||"demo"), JSON.stringify(next));
  }

  // ── compute scores ────────────────────────────────────────────────────
  const GDS_REV = ["g1","g5","g7","g11","g13"];
  const GDS_IDS = ["g1","g2","g3","g4","g5","g6","g7","g8","g9","g10","g11","g12","g13","g14","g15"];
  const mmseScore  = MMSE.filter(i=>allData[i.id]==="1").length;
  const mmseOk     = MMSE.filter(i=>allData[i.id]!==undefined).length === MMSE.length;
  const moItems    = Object.keys(allData).filter(k=>k.startsWith("mo_") && allData[k]!==undefined).length;
  const moRaw      = Object.keys(allData).filter(k=>k.startsWith("mo_") && allData[k]==="1").length;
  const moScore    = Math.min(30, moRaw + (allData.mo_edu==="yes"?1:0));
  const moOk       = moItems >= 30;
  const gdsScore   = GDS.reduce((s,item)=>{const v=allData[item.id];if(!v)return s;return s+(item.rev?(v==="no"?1:0):(v==="yes"?1:0));},0);
  const gdsOk      = GDS_IDS.every(id=>allData[id]!==undefined);
  const adlScore   = ADL.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0);
  const adlOk      = ADL.every(i=>allData[i.id]!==undefined);
  const iadlMax    = IADL.reduce((s,i)=>s+Math.max(...i.opts.map(o=>o.s)),0);
  const iadlScore  = IADL.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0);
  const iadlOk     = IADL.every(i=>allData[i.id]!==undefined);
  const mnaScore   = MNA.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0);
  const mnaOk      = MNA.every(i=>allData[i.id]!==undefined);
  const sppbScore  = (allData.sp_bal!==undefined?Number(allData.sp_bal):0)+(allData.sp_walk!==undefined?Number(allData.sp_walk):0)+(allData.sp_chair!==undefined?Number(allData.sp_chair):0);
  const sppbOk     = allData.sp_bal!==undefined&&allData.sp_walk!==undefined&&allData.sp_chair!==undefined;

  const SCORES = [
    {id:"mmse",    label:"MMSE",         score:mmseScore, max:30,  ok:mmseOk,   fn:s=>s>=27?"Normal":s>=21?"Mild impairment":s>=11?"Moderate impairment":"Severe impairment"},
    {id:"moca",    label:"MoCA",         score:moScore,   max:30,  ok:moOk,     fn:s=>s>=26?"Normal":s>=18?"Mild impairment":"Moderate/Severe impairment"},
    {id:"gds",     label:"GDS-15",       score:gdsScore,  max:15,  ok:gdsOk,    fn:s=>s<=4?"Normal":s<=8?"Mild depression":s<=11?"Moderate depression":"Severe depression"},
    {id:"barthel", label:"Barthel",      score:BARTHEL.reduce((s,i)=>allData[i.id]!==undefined?s+Number(allData[i.id]):s,0), max:100, ok:BARTHEL.every(i=>allData[i.id]!==undefined), fn:s=>s===100?"Full independence":s>=75?"Mild dependence":s>=50?"Moderate dependence":s>=25?"Severe dependence":"Total dependence"},
    {id:"adl",     label:"ADL",          score:adlScore,  max:6,   ok:adlOk,    fn:s=>s===6?"Full independence":s>=4?"Mild dependence":s>=2?"Moderate dependence":"Severe dependence"},
    {id:"iadl",    label:"IADL",         score:iadlScore, max:iadlMax, ok:iadlOk, fn:s=>{const p=s/iadlMax;return p>=0.9?"Full independence":p>=0.6?"Mild dependence":p>=0.3?"Moderate dependence":"Severe dependence";}},
    {id:"sppb",    label:"SPPB",         score:sppbScore, max:12,  ok:sppbOk,   fn:s=>s===12?"Normal":s>=9?"Mild limitation":s>=7?"Moderate limitation":"Severe limitation"},
    {id:"mna",     label:"MNA-SF",       score:mnaScore,  max:14,  ok:mnaOk,    fn:s=>s>=12?"Normal":s>=8?"At risk of malnutrition":"Malnourished"},
    {id:"tug",     label:"TUG",          score:allData.tug_s?""+allData.tug_s+"s":"-", max:null, ok:!!allData.tug_s, fn:s=>s},
    {id:"handgrip",label:"Handgrip",     score:allData.hg_val?""+allData.hg_val+" kg":"-", max:null, ok:!!allData.hg_val, fn:()=>allData.hg_val?hgPercentileLabel(parseFloat(allData.hg_val),age(PATIENT.dob),PATIENT.gender||"M").label:""},
    {id:"cfs",     label:"CFS",          score:allData.cfs, max:9, ok:!!allData.cfs, fn:s=>CFS[(s||1)-1]?CFS[(s||1)-1].label:""},
  ];

  // ── save to dashboard ─────────────────────────────────────────────────
  function saveAndReturn(){
    const pts = JSON.parse(localStorage.getItem("gs_patients")||"[]");
    const scores = {};
    if(mmseOk) scores.mmse = mmseScore;
    if(moOk)   scores.moca = moScore;
    if(gdsOk)  scores.gds  = gdsScore;
    if(adlOk)  scores.adl  = adlScore;
    if(mnaOk)  scores.mna  = mnaScore;
    const updated = pts.map(p=>{
      if(p.id === PATIENT.id){
        return {...p, cgaStatus:"complete",
          lastCGA: new Date().toISOString().split("T")[0],
          cfs: allData.cfs||p.cfs, scores:{...p.scores,...scores}};
      }
      return p;
    });
    localStorage.setItem("gs_patients", JSON.stringify(updated));
    alert("CGA salvato. Chiudi questa scheda per tornare alla dashboard.");
  }

  const [aiLoading, setAiLoading] = React.useState(false);
  const [aiError, setAiError]   = React.useState(null);

  // ── AI report generation ──────────────────────────────────────────────
  async function generateAiReport(){
    setAiLoading(true);
    setAiError(null);

    // Build clinical context from all scores
    const scoreLines = SCORES.filter(s=>s.ok).map(s=>{
      const interp = s.fn(s.score);
      return s.max
        ? s.label+": "+s.score+"/"+s.max+" ("+interp+")"
        : s.label+": "+s.score+" ("+interp+")";
    }).join("\n");

    const cfsLine = allData.cfs
      ? "CFS: "+allData.cfs+"/9 — "+CFS[allData.cfs-1].label+" — "+CFS[allData.cfs-1].desc
      : "";

    const hgLine = allData.hg_val
      ? "Handgrip: "+allData.hg_val+" kg — "+hgPercentileLabel(parseFloat(allData.hg_val),age(PATIENT.dob),PATIENT.gender||"M").label
      : "";

    const diag = (PATIENT.diagnoses||[]).join(", ") || "Non specificate";
    const meds = (PATIENT.medications||[]).join(", ") || "Non specificate";
    const ptAge = age(PATIENT.dob);
    const ptSex = PATIENT.gender==="F"?"Femmina":"Maschio";

    const prompt = `Sei un medico geriatra esperto. Stai redigendo il report di una Valutazione Multidimensionale Geriatrica (VMG).

PAZIENTE:
- Nome: ${PATIENT.firstName} ${PATIENT.lastName}
- Età: ${ptAge} anni, ${ptSex}
- Reparto: ${PATIENT.ward||"N/D"}
- Medico: ${PATIENT.physician||"N/D"}
- Diagnosi attive: ${diag}
- Terapia in atto: ${meds}

RISULTATI VMG:
${scoreLines}
${cfsLine}
${hgLine}

Genera un report clinico strutturato e professionale in italiano. Deve essere pratico, concreto, direttamente utilizzabile dal clinico. Per ogni sezione fornisci osservazioni specifiche basate sui dati numerici forniti, con raccomandazioni evidence-based personalizzate.

Rispondi SOLO con un JSON nel seguente formato, senza altro testo, senza markdown, senza backtick:
{
  "clinical_summary": "testo della sintesi clinica generale (4-6 righe, includi CFS e quadro generale di fragilità)",
  "cognitive_notes": "testo valutazione cognitiva (3-4 righe con raccomandazioni specifiche)",
  "functional_notes": "testo valutazione funzionale (3-4 righe con obiettivi riabilitativi)",
  "clinical_notes": "testo valutazione clinico-farmacologica (3-4 righe con segnalazioni Beers/polipharmacy se rilevanti)",
  "social_notes": "testo valutazione sociale (2-3 righe)",
  "problems": "elenco numerato dei problemi/bisogni principali identificati",
  "goals": "obiettivi terapeutici a breve (1 mese) e medio termine (3-6 mesi)",
  "interventions": "interventi multidimensionali proposti: medici, riabilitativi, nutrizionali, sociali, farmacologici",
  "follow_up": "piano di follow-up: tempistiche di rivalutazione, parametri da monitorare, consulenze da attivare"
}`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1800,
          messages:[{role:"user", content:prompt}]
        })
      });
      const data = await resp.json();
      const raw = data.content.map(b=>b.text||"").join("").trim();
      const clean = raw.replace(/^```json|^```|```$/gm,"").trim();
      const parsed = JSON.parse(clean);

      const next = {...rep};
      Object.keys(parsed).forEach(k=>{ if(parsed[k]) next[k]=parsed[k]; });
      setRep(next);
      localStorage.setItem("gs_report_draft_"+(PATIENT.id||"demo"), JSON.stringify(next));
    } catch(e){
      setAiError("Errore nella generazione IA: "+e.message+". Verifica la connessione e riprova.");
    } finally {
      setAiLoading(false);
    }
  }

  // ── text field helper ─────────────────────────────────────────────────
  function TF({k, rows, ph}){
    return(
      <textarea rows={rows||2} value={rep[k]||""}
        onChange={e=>setField(k,e.target.value)}
        placeholder={ph}
        style={{width:"100%",padding:"9px 11px",border:"1px solid var(--border)",borderRadius:2,
          fontSize:12,resize:"vertical",background:"var(--cream)",color:"var(--ink)",
          lineHeight:1.65,fontFamily:"'DM Sans',sans-serif"}}/>
    );
  }

  const today = new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});

  return(
    <div className="fu">
      <ScaleHeader title={T.reportTitle} subtitle={T.reportSubtitle}" badge="Sintesi"/>

      {/* ── AI generate banner ────────────────────────────────────────── */}
      <div style={{background:"linear-gradient(135deg,rgba(201,168,76,.12),rgba(61,107,94,.1))",

        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>

            </div>
            <div style={{fontSize:11,color:"var(--gray)",lineHeight:1.55}}>
              Claude analizza tutti i punteggi VMG e redige automaticamente il report clinico con raccomandazioni evidence-based. Il medico potrà modificarlo liberamente.
            </div>
            {aiError&&(
              <div style={{fontSize:11,color:"var(--red)",marginTop:6,padding:"6px 10px",
                background:"rgba(192,57,43,.08)",borderRadius:2}}>{aiError}</div>
            )}
          </div>
          <button onClick={generateAiReport} disabled={aiLoading}
            style={{flexShrink:0,padding:"10px 20px",
              background:aiLoading?"var(--border)":"var(--gold)",
              color:aiLoading?"var(--gray)":"white",border:"none",borderRadius:2,
              cursor:aiLoading?"not-allowed":"pointer",fontSize:12,fontWeight:600,
              fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",
              transition:"all .2s",minWidth:120}}>
            {aiLoading?"⏳ Generando...":"✨ Genera"}
          </button>
        </div>
        {aiLoading&&(
          <div style={{marginTop:12,height:3,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",background:"var(--gold)",borderRadius:2,
              animation:"progressBar 2s ease-in-out infinite",width:"60%"}}/>
          </div>
        )}
      </div>

      {/* ── banner salva ─────────────────────────────────────────────── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"rgba(61,107,94,.07)",border:"1px solid rgba(61,107,94,.2)",
        borderRadius:2,padding:"12px 16px",marginBottom:16}}>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:"var(--sage)"}}>Salva nella Dashboard</div>
          <div style={{fontSize:11,color:"var(--gray)",marginTop:1}}>Aggiorna lo stato del paziente e i punteggi</div>
        </div>

          style={{padding:"9px 22px",background:"var(--sage)",color:"white",border:"none",

          textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Score Summary</div>

// ─── SCALE SELECTOR ───────────────────────────────────────────────────────

          </span>
          <span className="mono" style={{fontSize:8,color:"var(--gold)",letterSpacing:"0.12em",marginLeft:4,
            border:"1px solid rgba(201,168,76,.3)",padding:"2px 5px",borderRadius:2}}>CGA</span>
        </div>
        {(_branding.orgName||_branding.orgSub)&&(
          <div style={{marginTop:8,borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:8}}>
            {_branding.orgName&&<div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,.8)"}}>{_branding.orgName}</div>}

      <div style={{flex:1,padding:"36px 40px",maxWidth:900,margin:"0 auto",width:"100%"}}>

      {/* Footer CTA */}

          <span className="serif" style={{fontSize:22,fontWeight:300}}>{count}</span>
          <span style={{fontSize:13,color:"var(--gray)",marginLeft:6}}>{T.scalesSelected}</span>

              style={{background:lang===l?"rgba(61,107,94,.12)":"none",
                border:lang===l?"1px solid rgba(61,107,94,.25)":"1px solid var(--border)",
                borderRadius:4,cursor:"pointer",fontSize:14,padding:"3px 4px",
                opacity:lang===l?1:.55,lineHeight:1}}>
              {{"it":"🇮🇹","en":"🇬🇧","zh":"🇨🇳","fr":"🇫🇷","es":"🇪🇸","de":"🇩🇪","ar":"🇸🇦","ja":"🇯🇵","pt":"🇧🇷"}[l]}
            </button>
          ))}

        <button onClick={()=>onStart(sel)}

            color:"white",border:"none",borderRadius:2,cursor:count>0?"pointer":"default",

            transition:"background .2s"}}
          onMouseEnter={e=>{if(count>0)e.target.style.background="var(--ink)";}}
          onMouseLeave={e=>{if(count>0)e.target.style.background="var(--sage)";}}>
          {T.beginBtn}
        </button>
      </div>
    </div>
  );
}

// ─── ASSESSMENT VIEW ──────────────────────────────────────────────────────
function Assessment({selected,onBack,tFn,switchLang,lang}){
  const T=tFn||(CGA_TRANS[getCGALang()]||CGA_TRANS.it);
  const [activeId,setActiveId]=useState(null);
  const [data,setData]=useState({});

  // Build flat list of selected scales in order
  const flatScales=[];
  DOMAINS.forEach(dom=>{
    dom.scales.forEach(sc=>{
      if(selected[sc.id]) flatScales.push({...sc,domainIcon:dom.icon,domainColor:dom.color,domainLabel:dom.label});
    });
  });
  useEffect(()=>{if(flatScales.length>0&&!activeId)setActiveId(flatScales[0].id);},[]);

  // MMSE score for pain panel
  const mmseScore=MMSE.filter(i=>data[i.id]==="1").length;
  const mmseComplete=MMSE.filter(i=>data[i.id]!==undefined).length===30;

  function progress(id){
    if(id==="mmse")  return MMSE.filter(i=>data[i.id]!==undefined).length/MMSE.length;
    if(id==="gds")   return GDS.filter(i=>data[i.id]!==undefined).length/GDS.length;
    if(id==="cam")   return CAM.filter(i=>data[i.id]!==undefined).length/CAM.length;
    if(id==="barthel")return BARTHEL.filter(i=>data[i.id]!==undefined).length/BARTHEL.length;
    if(id==="adl")   return ADL.filter(i=>data[i.id]!==undefined).length/ADL.length;
    if(id==="iadl")  return IADL.filter(i=>data[i.id]!==undefined).length/IADL.length;
    if(id==="mna")   return MNA.filter(i=>data[i.id]!==undefined).length/MNA.length;
    if(id==="moca")  return (()=>{const mo_items=30;const mo_ans=Object.keys(data).filter(k=>k.startsWith("mo_")&&data[k]!==undefined).length;return mo_ans/mo_items;})();
    if(id==="clock") return [data.clock_draw,data.clock_num,data.clock_hands].filter(Boolean).length/3;
    if(id==="handgrip") return data.hg_val?1:0;
    if(id==="brass")  return BRASS_ITEMS.filter(i=>data[i.id]!==undefined).length/BRASS_ITEMS.length;
    if(id==="mpi")    return (()=>{
      const manual=["mpi_social","mpi_med"].filter(k=>data[k]!==undefined).length;
      const auto=["adl","iadl","mmse","mna","barthel","brass"].filter(k=>{
        if(k==="brass") return BRASS_ITEMS.every(i=>data[i.id]!==undefined);
        return data[k+"_done"]||false;
      }).length;
      return (manual+auto)/8;
    })();
    if(id==="braden") return Object.keys(data).filter(k=>k.startsWith("br_")).length/6;
    if(id==="zarit") return ZARIT.filter((_,i)=>data[`z${i}`]!==undefined).length/ZARIT.length;
    if(id==="cfs")   return data.cfs?1:0;
    if(id==="charlson")return Object.keys(data).some(k=>k.startsWith("ch"))?0.5:0;
    if(id==="cirs")  return Object.keys(data).some(k=>k.startsWith("ci_"))?0.5:0;
    if(id==="sppb")  return [data.sp_bal,data.sp_walk,data.sp_chair].filter(v=>v!==undefined).length/3;
    if(id==="tug")   return data.tug_s?1:0;
    if(id==="tinetti")return Object.keys(data).filter(k=>k.startsWith("ti")).length/12;
    if(id==="beers") return data.poly_n?1:0;
    if(id==="pain")  return (data.nrs_val!==undefined||PAINAD.some(p=>data[p.id]!==undefined))?0.5:0;
    if(id==="social")return Object.keys(data).filter(k=>k.startsWith("soc")).length/5;
    if(id==="sleep") return Object.keys(data).filter(k=>k.startsWith("sl")).length/5;
    if(id==="continence")return Object.keys(data).filter(k=>k.startsWith("co")).length/4;
    if(id==="dysphagia")return Object.keys(data).filter(k=>k.startsWith("dy")).length/8;
    if(id==="report")return data.cfs?1:0;
    return 0;
  }

  const activeScale=flatScales.find(s=>s.id===activeId);
  const activeIdx=flatScales.findIndex(s=>s.id===activeId);

  function renderPanel(){
    const p=data; const sp=d=>setData(d);
    if(activeId==="mmse")      return <MMSEPanel d={p} set={sp}/>;
    if(activeId==="moca")      return <MoCAPanel d={p} set={sp}/>;
    if(activeId==="clock")     return <ClockPanel d={p} set={sp}/>;
    if(activeId==="gds")       return <GDSPanel d={p} set={sp}/>;
    if(activeId==="cam")       return <CAMPanel d={p} set={sp}/>;
    if(activeId==="barthel")   return <BarthelPanel d={p} set={sp}/>;
    if(activeId==="adl")       return <ADLPanel d={p} set={sp}/>;
    if(activeId==="iadl")      return <IADLPanel d={p} set={sp}/>;
    if(activeId==="sppb")      return <SPPBPanel d={p} set={sp}/>;
    if(activeId==="tug")       return <TUGPanel d={p} set={sp}/>;
    if(activeId==="tinetti")   return <TinettiPanel d={p} set={sp}/>;
    if(activeId==="cirs")      return <CIRSPanel d={p} set={sp}/>;
    if(activeId==="charlson")  return <CharlsonPanel d={p} set={sp}/>;
    if(activeId==="beers")     return <BeersPanel d={p} set={sp}/>;
    if(activeId==="pain")      return <PainPanel d={p} set={sp} mmseScore={mmseScore} mmseComplete={mmseComplete}/>;
    if(activeId==="mna")       return <MNAPanel d={p} set={sp}/>;
    if(activeId==="handgrip")  return <HandgripPanel d={p} set={sp}/>;
    if(activeId==="brass")     return <BRASSPanel d={p} set={sp}/>;
    if(activeId==="mpi")       return <MPIPanel d={p} set={sp} allData={data}/>;
    if(activeId==="braden")    return <BradenPanel d={p} set={sp}/>;
    if(activeId==="social_net")return <SocialPanel d={p} set={sp}/>;
    if(activeId==="zarit")     return <ZaritPanel d={p} set={sp}/>;
    if(activeId==="sleep")     return <SleepPanel d={p} set={sp}/>;
    if(activeId==="continence")return <ContinencePanel d={p} set={sp}/>;
    if(activeId==="dysphagia") return <DysphagiaPanel d={p} set={sp}/>;
    if(activeId==="cfs")       return <CFSPanel d={p} set={sp}/>;
    if(activeId==="report")    return <ReportPanel allData={p} selected={selected}/>;
    return <div style={{padding:20,color:"var(--gray)"}}>Coming soon.</div>;
  }

  const completedCount=flatScales.filter(s=>progress(s.id)>0).length;

  return(
    <div style={{display:"flex",minHeight:"100vh",background:"var(--cream)"}}>
      <HelpModal/>
      {/* Sidebar */}
      <aside style={{width:220,background:"var(--ink)",display:"flex",flexDirection:"column",
        height:"100vh",position:"sticky",top:0,overflowY:"auto"}}>
        <div style={{padding:"20px 16px 16px",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <svg viewBox="0 0 22 22" style={{width:18,height:18}}>
              <circle cx="11" cy="11" r="9.5" fill="none" stroke="rgba(90,144,128,.5)" strokeWidth="1"/>
              <circle cx="11" cy="11" r="5.5" fill="none" stroke="rgba(90,144,128,.7)" strokeWidth=".8"/>
              <circle cx="11" cy="11" r="2" fill="var(--sage-lt)"/>
            </svg>
            <span className="serif" style={{fontSize:18,fontWeight:600,color:"white",letterSpacing:"-0.02em"}}>
              Geri<span style={{color:"var(--sage-lt)",fontStyle:"italic"}}>Scope</span>
            </span>
          </div>
          {(_branding.orgName)&&(
            <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.6)",
              marginBottom:4,letterSpacing:"0.02em"}}>{_branding.orgName}</div>
          )}
          <div style={{fontSize:12,fontWeight:500,color:"rgba(255,255,255,.7)",marginBottom:1}}>
            {PATIENT.lastName}, {PATIENT.firstName}
          </div>
          <div className="mono" style={{fontSize:9,color:"rgba(255,255,255,.3)",letterSpacing:"0.06em"}}>
            {age(PATIENT.dob)}y · {PATIENT.ward}
          </div>
          <div style={{marginTop:10,height:3,background:"rgba(255,255,255,.1)",borderRadius:2}}>
            <div style={{width:`${(completedCount/flatScales.length)*100}%`,height:"100%",
              background:"var(--sage-lt)",borderRadius:2,transition:"width .4s"}}/>
          </div>
          <div className="mono" style={{fontSize:9,color:"rgba(255,255,255,.3)",marginTop:4,letterSpacing:"0.06em"}}>
            {completedCount}/{flatScales.length} scales
          </div>
        </div>
        <nav style={{flex:1,padding:"10px 8px",overflowY:"auto"}}>
          {DOMAINS.map(dom=>{
            const domScales=flatScales.filter(s=>s.domainLabel===dom.label);
            if(domScales.length===0)return null;
            return(
              <div key={dom.id} style={{marginBottom:8}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,.25)",letterSpacing:"0.1em",
                  textTransform:"uppercase",padding:"4px 8px"}}>{dom.icon} {dom.label.split(" ")[0]}</div>
                {domScales.map(sc=>{
                  const prog=progress(sc.id);
                  const isA=activeId===sc.id;
                  return(
                    <button key={sc.id} onClick={()=>setActiveId(sc.id)}
                      style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
                        width:"100%",border:"none",cursor:"pointer",textAlign:"left",
                        background:isA?"rgba(61,107,94,.25)":"transparent",
                        borderLeft:isA?"2px solid var(--sage-lt)":"2px solid transparent",
                        borderRadius:2,transition:"all .15s",fontFamily:"'DM Sans',sans-serif",marginBottom:1}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:isA?500:400,
                          color:isA?"white":"rgba(255,255,255,.5)"}}>{sc.label}</div>
                        <div style={{marginTop:3,height:2,background:"rgba(255,255,255,.08)",borderRadius:1}}>
                          <div style={{width:`${prog*100}%`,height:"100%",
                            background:prog===1?"var(--green)":"var(--sage-lt)",
                            borderRadius:1,transition:"width .3s"}}/>
                        </div>
                      </div>
                      {prog===1&&<span style={{fontSize:10,color:"var(--green)"}}>✓</span>}
                    </button>
                  );
                })}
              </div>
            );
          })}
        </nav>
        <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,.07)"}}>
          <button onClick={onBack}
            style={{width:"100%",padding:"8px",background:"rgba(255,255,255,.06)",
              border:"1px solid rgba(255,255,255,.1)",borderRadius:2,cursor:"pointer",
              color:"rgba(255,255,255,.4)",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>
            {T.changePlan}
          </button>
        </div>
      </aside>

      {/* Main content */}
      <main style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}}>
        {/* Top bar */}
        <header style={{background:"var(--white)",borderBottom:"1px solid var(--border)",
          padding:"14px 36px",display:"flex",alignItems:"center",justifyContent:"space-between",
          position:"sticky",top:0,zIndex:40}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {activeScale&&(
              <>
                <span style={{fontSize:18}}>{activeScale.domainIcon}</span>
                <div>
                  <div className="serif" style={{fontSize:18,fontWeight:600}}>{activeScale.label}</div>
                  <div className="mono" style={{fontSize:9,color:"var(--gray)",letterSpacing:"0.08em",marginTop:1}}>
                    {activeScale.domainLabel.toUpperCase()}
                  </div>
                </div>
              </>
            )}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{if(activeIdx>0)setActiveId(flatScales[activeIdx-1].id)}}
              disabled={activeIdx===0}
              style={{padding:"7px 16px",border:"1px solid var(--border)",borderRadius:2,
                background:"transparent",cursor:activeIdx>0?"pointer":"default",
                fontSize:12,color:activeIdx>0?"var(--gray)":"var(--border)",
                fontFamily:"'DM Sans',sans-serif"}}>{T.prevBtn}</button>
            <button onClick={()=>{if(activeIdx<flatScales.length-1)setActiveId(flatScales[activeIdx+1].id)}}
              disabled={activeIdx===flatScales.length-1}
              style={{padding:"7px 16px",background:"var(--sage)",color:"white",
                border:"none",borderRadius:2,
                cursor:activeIdx<flatScales.length-1?"pointer":"default",
                fontSize:12,fontWeight:500,fontFamily:"'DM Sans',sans-serif",transition:"background .2s"}}
              onMouseEnter={e=>{if(activeIdx<flatScales.length-1)e.target.style.background="var(--ink)";}}
              onMouseLeave={e=>{e.target.style.background="var(--sage)";}}>
              {T.nextBtn}
            </button>
          </div>
        </header>

        {/* Scale panel */}
        <div style={{flex:1,padding:"28px 36px",maxWidth:800,width:"100%"}}>
          {renderPanel()}
        </div>
      </main>
    </div>
  );
}

  const [disclaimerDone, setDisclaimerDone] = React.useState(
    ()=>sessionStorage.getItem("gs_disclaimer")==="1"
  );
  function acceptDisclaimer(){ sessionStorage.setItem("gs_disclaimer","1"); setDisclaimerDone(true); }
  const [phase,setPhase]=useState("select");
  const [lang,setLang]=useState(()=>getCGALang());
  const T=CGA_TRANS[lang]||CGA_TRANS.it;
  function switchLang(l){ localStorage.setItem("gs_lang",l); setLang(l); }
  useEffect(()=>{
    document.documentElement.lang=T.lang||lang;
    document.documentElement.dir=T.dir||"ltr";
  },[lang]);
  const [selected,setSelected]=useState({});
  if(!disclaimerDone) return <DisclaimerModal onAccept={acceptDisclaimer}/>;
  return(
    <div>
      {phase==="select"
        ?<Selector onStart={sel=>{setSelected(sel);setPhase("assess");}}/>
        :<Assessment selected={selected} onBack={()=>setPhase("select")}/>}
      <DisclaimerFooter/>
    </div>
  );
}
